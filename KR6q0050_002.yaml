body:
  text: 徑山語風老人圓信較定無地地主人郭凝之彚編唐甘贄行者嗣法南泉順池州甘贄行者一日入南泉設齋黃檗為首座行者請施財黃檗曰財法二施等無差別甘曰恁麼道爭消得某甲嚫便將出去須臾復入曰請施財黃檗曰財法二施等無差別甘乃行嚫翠巖真云甘贄行者𭶑兒落節黃檗施財何曾夢見妙喜舉翠巖語云一等是隨邪逐惡這雲居羅漢却較些子楚石琦云恁麼恁麼扶起甘贄推倒黃檗不恁麼不恁麼扶起黃檗推倒甘贄只如恁麼中不恁麼不恁麼中却恁麼又作麼生師子咬人韓獹逐塊又一日入寺設粥仍請南泉念誦南泉乃白椎曰請大衆為貍奴白牯念摩訶般若波羅蜜甘拂袖便出南泉粥後問典座行者在甚處典座曰當時便去也南泉便打破鍋子妙喜云心不負人面無慙色甘常接待往來有僧問曰行者接待不易甘曰譬如餧驢餧馬僧休去有住庵僧緣化什物甘曰有一問若道得即施乃書心字問是甚麼字曰心字又問妻甚麼字妻曰心字甘曰某甲山妻亦合住庵其僧無語甘亦無施又問一僧甚麼處來曰溈山來甘曰曾有僧問溈山如何是西來意溈山舉起拂子上座作麼生會溈山意曰借事明心附物顯理甘曰且歸溈山去好保福聞之乃仰手覆手藥山令供養主抄化甘行者問甚處來曰藥山來甘曰來作麼曰教化甘曰將得藥來麼曰行者有甚麼病甘便捨銀兩鋌意山中有人此物却回無人即休主便歸納疏藥山問曰子歸何速主曰問佛法相當得銀兩鋌藥山令舉其語主舉已藥山曰速送還他子著賊了也主便送還甘曰繇來有人遂添銀施之同安顯云早知行者恁麼問終不道藥山來唐刺史陸亘嗣法南泉願陸亘字景山蘇州吳人觀察池州時請南泉普願禪師入郡伸弟子禮公問曰古人瓶中養一鵝鵝漸長大出瓶不得如今不得毀瓶不得損鵝和尚作麼生出得南泉召大夫公應諾南泉曰出也高峰妙云南泉潦倒手腳不親縱饒出得也是死貨高峰只向他道大夫還曾示人麼才擬祇對便與亂棒打出非特為遮漢脫却鶻臭布衫要使天下衲僧箇箇解粘去縛慶快平生公從此開解即禮謝問弟子從六合來彼中還更有身否南泉曰分明記取舉似作家曰和尚不可思議到處世界成就南泉曰適來總是大夫分上事公異日謂南泉曰弟子亦薄會佛法南泉便問大夫十二時中作麼生曰寸絲不挂南泉曰猶是階下漢又曰不見道有道君王不納有智之臣南泉一日上堂公曰請和尚為衆説法南泉曰教老僧作麼生説曰和尚豈無方便南泉曰道他欠少甚麼曰為甚麼有六道四生南泉曰老僧不教他公與南泉見人雙陸指骰子曰恁麼不恁麼正恁麼信彩去時如何南泉拈起骰子曰臭骨頭十八公問弟子家中有一片石或時坐或時臥如今擬鐫作佛還得否南泉曰得公曰莫不得否南泉曰不得雲巖云坐即佛不坐即非佛洞山云不坐即佛坐即非佛天奇拈云陸亘大夫向這石頭上坐臥不安仔細撿點將來皆是自不守分不是南泉爭得風光遍界恁麼便恁麼不恁麼便不恁麼若不具眼總是泥裏洗土塊靈岩證據洞山交互方見得打鼓弄琵琶相逢兩會家公向南泉道肇法師也甚奇怪解道天地與我同根萬物與我一體南泉指庭前牡丹花曰大夫時人見此一株花如夢相似圓悟勤云陸亘手攀金鎖南泉八字打開直得七珍八寶羅列目前乃竪起拂子云天地一指萬物一馬通身是眼分疏不下妙喜杲云若向理上看非但南泉謾他陸亘大夫一點不得亦未摸著他腳跟下一莖毛在若向事上看非但陸亘大夫謾他南泉一點不得亦未夢見他汗臭氣在或有出來道大小徑山説理説事只向他道但向理事上會取楚石琦云大衆還會麼你若向天地同根萬物一體上會落在肇法師圈䙡裏若向理事上會又落在妙喜葛藤中總無自由分只如南泉指牡丹向陸亘道大夫時人見此一株花如夢相似你畢竟如何會天寧不惜眉毛為你諸人下個注腳平蕪盡處是青山行人更在青山外妙喜頌云天地同根伸一問未曾擡步已亡家無陰陽處華重發玉本無瑕却有瑕公又問天王居何地位曰若是天王即非地位曰弟子聞説天王是居初地曰應以天王身得度者即現天王身而為説法公辭歸宣城治所南泉問大夫去彼將何治民公曰以智慧治民南泉曰恁麼則彼處生靈盡遭塗炭去也南泉入宣州公出迎接指城門曰人人盡喚作甕門未審和尚喚作甚麼門曰老僧若道恐辱大夫風化曰忽然賊來時作麼生南泉曰王老師罪過公又問大悲菩薩用許多手眼作甚麼南泉曰祇如國家又用大夫作甚麼楚石琦代云隨家豐儉暨南泉圓寂院主問大夫何不哭先師公曰院主道得即哭院主無對長慶代云合哭不合哭密雲悟代云蒼天蒼天雖似將哭代哭也可救一半唐相圓裴休嗣法黃檗運相國裴休居士字公美河東聞喜人也家世奉佛兒時與兄弟偕隱晝講經夜著書經年不出戶中年後不食葷血常齋戒屏嗜欲香爐貝典不離左右詠歌贊唄以為法樂刺洪州時入龍興寺觀畫壁乃問是何圖相主事者對曰高僧真儀公曰真儀可觀高僧何在主事無對公曰此間有禪人否曰近有一僧投寺執役頗似禪者僧即黃檗運也公延至曰適有一問諸德吝辭今請上人代酬一語黃檗曰第言之公舉前問黃檗朗聲曰裴休公應諾黃檗曰在甚麼處徑山杲禪師因李參政到山舉此公案拈云裴公將錯就錯脫盡根塵黃檗信口垂慈不費心力似地擎山不知山之孤峻如石含玉不知玉之無瑕雖然如是黃檗只有殺人刀且無活人劍今日大資相公或問雲門真儀可觀高僧在甚麼處雲門亦召云相公相公若應諾雲門即向道今日堂中特謝供養楚石琦云裴相國道高僧在甚麼處分明換却眼睛黃檗更召相公剛把鉢盂安柄老妙喜與人錯下注腳便道似地擎山不知山之孤峻如石含玉不知玉之無瑕蹉過了也天寧即不然亦召相公相公應諾劈脊便棒免教這漢向死水裏淹殺公當下知旨如獲髻珠曰吾師真善知識也遂延入府署篤志內典深入法會既通徹祖意復博綜教相諸方禪學咸謂裴相不浪出黃檗之門也一日公以所解一編示黃檗黃檗接置于座略不披閲良久曰會麼公未測黃檗曰若便恁麼會得猶較些子若也形於紙墨何有吾宗公一日拓一尊佛於黃檗前跪曰請師安名黃檗召曰裴休公應諾黃檗曰與汝安名竟公禮拜妙喜云裴公黃檗可謂如水入水似金博金雖然如是撿點將來不無滲漏今日或有捧一尊像請雲門安名即向道清淨法身毗盧遮那佛若云謝師安名即向道下坡不走快便難逢楚石琦云裴公捧像黃檗安名冷地看來如大家教新婦相似直是好笑笑須三十年妙喜既不能坐斷未免隨例顛倒喚作清淨法身毗盧遮那佛周人以柏殷人以栗公謁石霜諸禪師石霜拈起笏問在天子手中為圭在官人手中為笏在老僧手中且道喚作甚麼公無對石霜乃留下笏密雲悟代云和尚不打自招公啓建法會問僧看什麼經曰無言童子經曰有幾卷曰兩卷曰既是無言為甚麼却有兩卷僧無對後龜山代云若論無言非惟兩卷公為觀察入山訪華林覺禪師問曰還有侍者否曰有一兩箇祇是不可見客公曰在甚麼處華林乃喚大空小空時二虎自菴後出華林語二虎曰有客且去二虎哮吼而去公問曰師作何行業感得如斯華林良久曰會麼曰不會華林曰山僧常念觀音空音湛頌云僧來展具已輸籌常念觀音獨不休雕虎風生君未會可憐空磕破鐘樓公嘗與圭峰密禪師遊入其閫域休居嘗不御酒肉著釋氏文數萬言如作勸發菩提心文圓覺經敘法界觀敘禪源詮敘原人論敘世皆服其精要唐常侍王敬初嗣法溈山祐王敬初襄州人為常侍視事次米和尚至公乃舉筆示之米曰還判得虗空否公擲筆入宅更不復出米致疑明日憑鼓山供養主入探其意米亦隨至潛在屏蔽間偵伺供養主才坐問曰昨日米和尚有甚麼言句便不相見公曰獅子咬人韓盧逐塊米聞此語即省前謬遽出朗笑曰我會也我會也公曰會即不無你試道看米曰請常侍舉公乃竪起一隻筯米曰這野狐精公曰這漢徹也大溈云米胡雖然如是且只得一橛常待云這漢徹去大似看樓打樓大溈即不然常侍雖是箇俗漢筆下有生殺之權米胡是一方善知識要且出他圈䙡不得當時待他擲下筆但向道我從來疑著這漢問僧一切衆生還有佛性也無僧曰有公指壁上畫狗子曰這箇還有也無僧無對公自代曰看咬著汝鄂州無等禪師謁公辭退將出門公召曰和尚無等回顧公敲柱三下無等以手作圓相復三撥之便行公初見睦州睦州問曰今日何故入院遲公曰看打毬來睦州曰人打毬馬打毬公曰人打毬睦州曰人困麼曰困睦州曰馬困麼曰困睦州曰露柱困麼公惘然無對歸至私第中夜忽然有省明日見睦州曰某甲會得昨日事也睦州曰露柱困麼曰困睦州許之臨濟與公到僧堂公問這一堂僧還看經麼臨濟曰不看經曰還習禪麼臨濟曰不習禪曰既不看經又不習禪畢竟作箇甚麼臨濟曰總教伊成佛作祖去曰金屑雖貴落眼成翳臨濟曰我將謂你是箇俗漢楚石琦云臨濟吹毛劍什麼處去也若也拈出有什麼王常侍在自出洞來無敵手得饒人處且饒人唐尚書陳操嗣法陳睦州睦州刺史陳操位至尚書參睦州陳尊宿一日睦州看經次公問和尚看什麼經睦州曰金剛經公曰六朝翻譯此當第幾譯睦州舉起經曰一切有為法如夢幻泡影公與僧齋次拈起糊餅問僧江西湖南還有這箇麼僧曰尚書適來喫箇甚麼公曰敲鐘謝響又齋僧次躬自行餅一僧展手擬接公却縮手僧無語公曰果然果然楚石琦代云久知尚書不吝問僧有箇事與上座商量得麼曰合取狗口公自摑口曰某甲罪過曰知過必改公曰恁麼則借上座口喫飯得麼又齋僧自行食次至首座前曰請施食首座曰三德六味公曰錯首座無對楚石琦代首座敲鉢作聲又與僚屬登樓次見數僧行來有一官人曰來者總是行腳僧公曰不是曰焉知不是公曰待來勘過須臾僧至樓前公驀喚上座僧皆舉首公謂諸官曰不信道公看資福禪師資福見來便畫一圓相公曰弟子與麼來早是不著便更畫圓相資福於中著一點公曰將謂是南番舶主資福便歸方丈閉却門雪竇云陳操止具一隻眼復頌云團團珠繞玉珊珊馬載驢馱上鐵船分付海山無事客鈎鰲時下一圈欒復云天下衲僧跳不出千巖頌云吾家密事俗人知月蝕盧同便有詩只為慎初兼護末不知失却兩莖眉又與禪者頌曰禪者有玄機機玄是復非欲了機前旨咸於句下違宋駙馬李遵勗嗣法谷隱聰李遵勗存公武舉進士大中祥符間真宗召對便殿尚萬壽公主後拜寧國軍節度使公探索宗要無間寒暑謁谷隱問出家事谷隱以崔趙公問徑山公案答之公于言下大悟作偈曰學道須是鐵漢著手心頭便判直趣無上菩提一切是非莫管宗門武庫云李公得心要於石門聰禪師嘗作二句偈寄發運朱正辭時許式為淮南漕朱以李頌示許請賡之朱曰雨催樵子還家許曰風送漁舟到岸又請浮山遠禪師和之浮山偈曰學道須是鐵漢著手心頭便判通身雖是眼睛也待紅罏再煅鉏麑觸樹迷封豫讓藏身吞炭鷺飛影落秋江風送蘆花兩岸諸公見大敬之李後復續末二句今所傳惟李一頌而已公一日與堅上座送別公問近離上黨得屆中都方接麈談遽回虎錫指雲屏之翠嶠訪雪嶺之清流未審此處彼處的的事作麼生上座曰利劒拂開天地靜霜刀才舉斗牛寒公曰恰直今日耳聵上座曰一箭落雙雕公曰上座為甚麼著草鞋睡座以衣袖一拂公低頭曰今日可謂降伏也上座曰普化出僧堂慈明在楊大年所大年朝中見公曰近得一道人真西河師子公曰我以拘文不能就謁奈何大年歸語慈明曰李公佛法中人聞道風遠至有願見之心政以法不得與侍從過從慈明於是黎明謁李公公閲謁使童子問曰道得即與上座相見慈明曰今日特來相看又令童子曰文刻白字當道種青松慈明曰不因今日節餘日定難逢童又出曰都尉言與麼則與上座相見去也慈明曰腳頭腳底公乃出坐定問曰我聞西河有金毛師子是否慈明曰甚麼處得者消息公便喝慈明曰野干鳴公又喝慈明曰恰是公大笑慈明辭公問如何是上座臨行一句慈明曰好將息公曰何異諸方慈明曰都尉又作麼生公曰放上座二十棒慈明曰專為流通公又喝慈明曰瞎公曰好去慈明應喏喏及還唐明公遣兩僧訊之慈明於書尾畫雙足寫來僧名寄之公作偈曰黑毫千里餘金槨示雙趺人天渾莫測珍重赤鬚胡寶元戊寅公遣使邀慈明曰海內法友惟師與楊大年耳大年棄我而先僕年來頓覺衰落忍死以一見公仍以書抵潭帥敦遣之慈明惻然與侍者舟而東下舟中作偈曰長江行不盡帝里到何時既得涼風便休將櫓棹施至京師與公相會月餘而公果沒公臨終時膈胃躁熱有尼道堅謂曰衆生見劫盡大火所燒時都尉切宜照管主人公公曰大師與我煎一服藥來堅無語公曰這師姑藥也不會煎得時慈明來視公畫一圓相又作偈獻師曰世界無依山河匪礙大海微塵須彌納芥拈起幞頭解下腰帶若覔死生問取皮袋慈明曰如何是本來佛性公曰今日熱如昨日隨聲便問臨行一句作麼生慈明曰本來無罣礙隨處任方圓公曰晚來困倦更不答話慈明曰無佛處作佛公於是泊然而逝二廟尤留神空宗聞公化與慈明問答嘉嘆久之慈明哭之慟臨壙乃別宋侍郎文公楊億嗣法廣慧璉侍郎文公楊億居士字大年幼舉神嬰壯負才名未知有佛一日過同僚見讀金剛經者且笑之彼誦自若公竊疑曰是豈出孔孟之右乎何侫甚因閲數板懵然始少敬信後會翰林李維勉令參問逮三十時由祕書監出守汝州首謁廣慧公便問布鼓當軒擊誰是知音者廣慧曰來風深辨公曰恁麼則禪客相逢祇彈指也廣慧曰君子可入公應喏喏廣慧曰草賊大敗夜語次廣慧曰祕監曾與甚人道話來公曰曾問雲巖諒監寺兩箇大蟲相咬時如何諒曰一合相某曰我祇管看未審恁麼道還得麼廣慧曰這裏即不然公曰請和尚別一轉語廣慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裡走金毛獅子變作狗擬欲將身北斗藏應須合掌南辰後公又問天上無彌勒地下無彌勒未審在甚麼處廣慧曰敲磚打瓦又問風穴道金沙灘頭馬郎婦意旨如何廣慧曰更道也不及又問承和尚有言一切罪業皆因財寶所生勸人踈於財利然南閻浮提衆生以財為命國以財聚人教中有財法二施何得勸人踈財乎廣慧曰幡竿尖上鐵籠頭公曰海壇馬子似驢大廣慧曰楚雞不是丹山鳳公曰佛滅二千歲比丘少慚愧公置一百問請答廣慧一一答回詳在洞山聰禪師語要中慈明依唐明嵩禪師嵩謂慈明曰楊大年內翰知見高入道穩實子不可不見慈明乃往見大年公問曰對面不相識千里却同風慈明曰近奉山門請公曰真箇脫空慈明曰前月離唐明公曰適來悔相問慈明曰作家公便喝慈明曰却是公復喝慈明以手劃一劃公吐舌曰真是龍象慈明曰是何言歟公喚客司點茶元來是屋裡人慈明曰也不消得茶罷又問如何是上座為人一句慈明曰切公曰與麼則長裙新婦拖泥走慈明曰誰得似內翰公曰作家作家慈明曰放你二十棒公拊膝曰這裡是甚麼所在慈明拍掌曰也不得放過又問記得唐明當時悟底因緣麼慈明曰唐明問首山如何是佛法的的大意首山曰楚王城畔汝水東流公曰祇如此語意旨如何慈明曰水上挂燈毬公曰與麼則孤負古人去也慈明曰內翰疑則別參公曰三腳蝦蟆跳上天慈明曰一任𨁝跳公乃館于齋中日夕質疑恨見之晚久之慈明辭還河東公曰有一語寄與唐明得麼慈明曰明月照見夜行人公曰却不相當慈明曰更深猶自可午後更愁人公曰開寶寺前金剛近日因甚麼汗出慈明曰知公曰上座臨行豈無為人底句慈明曰重疊關山路公曰與麼則隨上座去也慈明噓一聲公曰真師子兒大師子吼慈明曰放去又收來公曰適來失腳踏倒又得家童扶起慈明曰有甚麼了期公笑嘗問鹿門昭山主曰入山不畏虎當路却防人時如何昭曰君子坦蕩蕩又問李都尉曰釋迦六年苦行成得甚麼事都尉曰擔折知柴重又與都尉唐明廣慧汾陽問答次都尉曰彌陀演化於西方達磨傳心於東土胡來漢現水到渠成五嶽鎮靜以崢嶸百谷朝宗而浩渺一靈之性託境現形三有之中憑何立命慈明曰仙人無婦玉女無夫公曰尼剃頭不復生子慈明曰陝府鐵牛能哮吼嘉州大象念摩訶都尉曰側跳上山巔慈明曰騎牛不著靴元叟端云大小唐明墻塹不堅扄鐍不固致令他俗人有入室操戈之舉是你諸人且作麼生會擊拂子云白鷺下田千點雪黃鸝上樹一枝花廣慧曰進象倒戈汾陽曰端身裂面破問玄沙不出嶺保福不渡河善財參知識五十三員慧遠結黑白一十八士雪峰三度上投子智者九旬講法華這六箇漢為復野干鳴為復師子吼速道速道慈明曰水急魚行澀峰高鳥不棲公曰泗州大聖慈明曰土上加泥更一重都尉曰舌上覆金錢明曰半夜款樂動誰人得知音慧曰歌謠滿路人皆望汾陽曰看壁畫人笑問風穴提印南院傳衣昭公演化於西河嵩師領徒於并壘南宗之旨北土大興且道二師承誰恩力慈明曰不入蓮池浴懶向雪山遊公曰清涼山裡萬菩薩慈明曰維摩會中諸聖集都尉曰背負乾薪遭野火慈明曰口是禍門廣慧曰藏頭白海頭黑汾陽曰告天手捺地噓噓問忉利透日月之上四禪無風火之災三交駕鐵牛之車臨汝握全提之印獼猴有一面古鏡狸奴有萬里神光直下承當是何人也慈明曰朝看東南暮看西北公曰狸奴白牯却知有慈明曰淹殺家頭蒿都尉曰月裡煮油鐺慈明曰石人腰帶廣慧曰陳蒲鞋周金剛汾陽曰直裰又縫胡釘鉸問一切諸佛盡在裡許動即喪身失命著兩頭俱瞎擬議之時千山萬水直下會得也是炭庫裡坐地有不惜眉毛者通箇消息來慈明曰百雜碎公曰平生不妄語慈明曰也要道過都尉曰出穴兔遭罥慈明曰東西無滯礙南北得自由廣慧曰振錫下犁泥汾陽曰穿山透石壁鼻孔血淋淋慈明復有頌曰一言才出徹龍庭攪動須彌帝釋驚三世諸佛齊坐了杖頭傀儡弄雙睛公答曰今年桃李味甘香一顆千金買得嘗貯藥胡盧拖鼠味穴門小窄轉難藏五臺山裡有文殊羅漢天台洞內居為問子湖一隻狗何如普化一頭驢再答曰蜘蛛網中坐蟲兒不敢過昨夜三尺雪百鳥盡遭飢果熟樹低垂鵝肥甑箄破借問末山尼何如劉鐵磨慈明又作宗本頌左顧右黃昏莾鹵展手回來早是彰露且道作麼生是彰露底句公曰正殺人時𥅄出頭慈明曰兩腳捎空手叉胸都尉曰左鬚右髮隱文章慈明曰維摩一默文殊贊善若遇老僧在彼各與三十棒且道這二老漢過在甚麼處公曰頭破作七分如阿梨樹枝慈明曰迦葉不擎拳阿難不合掌都尉曰似犢牛兒未用角時慈明曰忙屈拳打令又曰教有明文佛身充滿于法界老僧今日充滿于法界侍郎即今在甚麼處公曰布裙一截泥努出膝蓋子慈明曰寬口布袴三尺杖都尉曰河水一擔直三文慈明曰只見鼻頭寬不見頂後濕蓋庶幾龍象蹴踏信非驢所堪矣公因微恙問環大師曰某今日忽違和大師慈悲如何醫療環曰丁香湯一碗公便作吐勢環曰恩愛成煩惱環為煎藥次公呌曰有賊環下藥於公前叉手側立公瞪目視之曰少叢林漢環拂袖而出又一日問曰某四大將欲離散大師如何相救環乃槌胸三下公曰賴遇作家環曰幾年學佛法俗氣猶未除公曰禍不單行環作噓噓聲公書偈遺李都尉曰漚生與漚滅二法本來齊欲識真歸處趙州東院西都尉見遂曰泰山廟裡賣紙錢都尉即至公已逝矣公修景德傳燈録入大藏流通於世宋侍郎楊傑嗣法天衣懷楊傑字次公無為人也宋元祐中為侍郎自號無為子公歷參諸名宿晚從天衣遊天衣每引龐居士機語令研究深造後奉祠泰山一日聞雞鳴睹日如盤湧忽大悟遂別有男不婚有女不嫁之偈曰男大須婚女大須嫁討甚間工夫更説無生話書以寄天衣天衣稱善時海印信禪師見之亦有偈曰我無男婚亦無女嫁困來便打眠誰管無生話其亙相提唱爾耳公又問本嵩律師以宣律師所講毗尼性體本嵩以偈答曰情智何嘗異犬吠蛇自行終南的的意日午打三更公肯之比提刑日與果昌覺禪師同遊山次公拈起大士飯石問既是飯石為甚麼咬不碎果昌曰祇為太硬公曰猶涉繁詞果昌曰未審提刑作麼生公曰硬果昌曰也是第二月公為寫七佛殿額乃問七佛重出世時如何果昌曰一回相見一回新公領之而已投子聰禪師嘗被人殺監寺更押聰繫獄時公按行入州界夢神人云州有肉身菩薩枉坐縲紲公即訪吏以聰事告公遽立釋之其贊投子青像曰一隻履兩牛皮金烏啼處木雞飛半夜賣油翁發笑白頭生得黑頭兒復贊五祖曰人孰無父祖獨有母其母為誰周氏季女濁港滔滔入大江門前依舊長安路及會芙蓉楷禪師公曰與師相別幾年芙蓉曰七年公曰學道來參禪來芙蓉曰不打這鼓笛公曰恁麼則空遊山水百無所能也芙蓉曰別來未久善能高鑒公大笑公有辭世偈曰生無可戀死無可捨太虗空中之乎者也將錯就錯西方極樂便奄然而終公有輔道集蘇軾為序傳於代宋簽判劉經臣嗣法智海逸劉經臣字興朝為簽判少以逸才登仕版於佛法未之信年三十二會東林照覺總禪師始醉心祖道後抵京師謁慧林沖禪師於僧問雪竇如何是諸佛本源答曰千峰寒色語下有省歲餘官雒幕就參韶山杲禪師將去官辭韶山韶山囑曰公如此用心何愁不悟向後或有非常境界無量歡喜宜急收拾若收拾得去便成法器若收拾不得則成失心之患未幾復至京師趨智海依正覺逸禪師請問因緣智海曰古人道平常心是道爾十二時中放光動地不自覺知向外馳求轉疏轉遠公益疑不解一夕入室智海舉傳燈所載香至國王問波羅提尊者何者是佛尊者曰見性是佛意旨如何公不能對疑甚歸就寢熟睡至五更覺來方追念間見種種異相表裏洞徹六根震動天地回旋如雲開月現喜不自勝忽憶韶山臨別所囑之言姑抑之逗明悉以所得告智海為證據智海曰更須用得始得公曰莫要踐履否智海厲聲曰這箇是甚麼事却説踐履公默契幻寄云簽判不能于千峰寒色瞥地遂帶纍波羅提尊者入無尾巴猢孫隊中輪轉流浪悲夫乃作發明心地頌八首及著明道諭儒篇以警世詞曰明道在乎見性余之所悟者見性而已孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也楊子曰視聽言貌思性所有也有見於此則能明乎道矣當知道不遠人人之於道猶魚之於水未嘗須臾離也唯其迷己逐物故終身由之而不知佛曰大覺儒曰先覺蓋覺此耳昔人有言曰今古應無墜分明在目前又曰大道祇在目前要且目前難睹欲識大道真體不離聲色言語又曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛去處祇這語聲是此佛者之語道為最親者立則見其參於前也在興則見其倚於衡也瞻之在前忽焉在後也取之左右逢其源也此儒者之語道為最邇者奈何此道唯可心傳不立文字故世尊拈花而妙心傳於迦葉達磨面壁而宗旨付於神光六葉既敷千花競秀分宗列派各有門庭故或瞬目楊眉擎拳舉指或行棒行喝竪拂拈槌或持義張弓輥毬舞笏或拽石搬土打鼓吹毛或一默一言一吁一笑乃至種種方便皆是親切為人然祇為太親故人多罔措瞥然見者不隔絲毫其或沉吟迢迢萬里欲明道者宜無忽焉祖祖相傳至今不絶真得吾儒所謂忿而不發開而弗違者矣余之有得實在此門反思吾儒自有其道良哉孔子之言默而識之一以貫之故目擊而道存指掌而意喻凡若此者皆合宗門之妙旨得教外之真機然而孔子之道傳之子思子思傳之孟子孟子既沒不得其傳而所以傳于世者特文字耳故余之學必求自得而後已幸余一夕開悟凡目之所見耳之所聞心之所思口之所談手足之所運動無非妙者得之既久日益見前每以與人人不能受然後知妙道果不可以文字傳也嗚呼是道也有其人則傳無其人則絶余既得之矣誰其似之乎終余之身而有其人邪無其人邪所不可得而知也故為記頌歌語以流播其事而又著此篇以諭吾徒云宋清獻公趙抃嗣法蔣山泉趙抃字悅道衢州西安人號知非子官至參政年四十餘擯去聲色系心宗教初從蔣山法泉禪師遊微有省又從大名天鉢寺重元禪師問心要師曰公立朝論政崇化明倫奚暇刻意於此公曰聞別傳之旨人人本有之事豈抃不能願究明之師乃令看狗子無佛性話會佛慧居衢之南禪公日親之慧未嘗容措一辭後典青州政事之餘多宴坐忽大雷震驚即契悟作偈曰默坐公堂虗隱几心澄不動湛如水一聲霹𮦷頂門開喚起從前自家底舉頭蒼蒼喜復喜剎剎塵塵無不是中下之人不得聞妙用神通而已矣佛慧聞笑曰趙悅道撞彩耳元豐初年七十二以太子少保告老退居三衢與山僧野老往來無間名所居為高齋以詩自見曰軒外長溪溪外山捲簾空曠雲水間高齋有問如何答清夜安眠白晝間又題偈見意曰腰佩黃金已退藏箇中消息也尋常世人欲識高齋老祇是柯村趙四郎復曰切忌錯認公一日遍辭親友其子㞦問後事公厲聲叱之遺佛慧書曰非師平日警誨至此必不得力矣少頃語如平時忽趺坐而化年七十七佛慧以偈贊曰仕也為瑞歸歟世作程人間金粟去天上玉樓成慧劍無纖缺氷壺徹底清春風水路孤月照雲明宋丞相張商英嗣法兜率悅丞相張商英居士字天覺號無盡蜀人也年十九應舉入京道由向氏家向預夢神人報曰明日接相公凌晨公至向異之勞問勤腆乃曰秀才未娶當以女奉灑掃後果及第乃娶之初任主簿因入僧寺覩梵夾莊嚴甚乃怫然曰吾孔聖書不及胡人教耶夜坐書室馮紙長吟中夜不眠向曰官人夜深何不睡去公以前意白之正此著無佛論向應聲曰既是無佛何論之有當須著有佛論始得公疑其言遂止後訪一同列見佛龕前經卷乃問何書云維摩詰所説經公信手開閲至此病非地大亦不離地大處歎曰胡語亦能爾乎問此經幾卷曰三卷乃借歸閲次向氏問看何書公曰維摩詰所説經向曰可熟讀此經然後著無佛論公繇是深信佛乘留心祖道因提刑至汾謁大達國師塔及夢國師接引覺而閲其語至國師問馬祖西來心印祖曰大德正閙在且去國師去祖喚曰大德國師回首祖曰是甚麼公乃有省作偈曰是甚麼是甚麼羅睺殿前燈是火不是阿祖喚回洎被善財破毗嵐風急九天高白鷺眼盲魚走過元祐六年為江西漕首謁東林照覺總禪師覺詰其所見與己合乃印可曰吾有得法弟子住玉溪乃慈古鏡也亦可與語公復因按部過分寧諸禪迓之公到先致敬玉溪慈次及諸山最後問兜率悅禪師悅為人短小公曾見龔德莊説其聰明可人乃曰聞公善文章悅大笑曰運使失却一隻眼了也從悅臨濟九世孫對運使論文章政如運使對從悅論禪也公不然其語乃強屈指曰是九世也問玉溪去此多少曰三十里曰兜率聻曰五里公是夜乃至兜率悅先一夜夢日輪升天被悅以手搏取乃説與首座曰日輪運轉之義聞張運使非久過此吾當深錐痛劄若肯回頭則吾門幸事首座曰今士大夫受人取奉慣恐其惡發別生事也悅曰正使煩惱祇退得我院也別無事公與悅語次稱賞東林悅未肯其説公乃題寺後擬瀑軒詩曰不向廬山尋落處象王鼻孔謾遼天意譏其不肯東林也公與悅語至更深論及宗門事悅曰東林既印可運使運使於佛祖言教有少疑否公曰有悅曰疑何等語公曰疑香嚴獨腳頌德山拓鉢話悅曰既於此有疑其餘安得無耶祇如巖頭言末後句是有耶是無耶公曰有悅大笑便歸方丈間却門公一夜睡不穩至五更下牀觸翻溺器乃大徹猛省前話遂有頌曰鼓寂鐘沉拓鉢回巖頭一拶語如雷果然祇得三年活莫是遭他授記來遂叩方丈門曰某已捉得賊了悅曰贓在甚處公無語悅曰都運且去來日相見翌日公遂舉前頌悅乃謂曰參禪祇為命根不斷依語生解如是之説公已深悟然至極微細處使人不覺不知墮在區宇乃作頌證之曰等間行處步步皆如雖居聲色寧滯有無一心靡異萬法非殊休分體用莫擇精粗臨機不礙應物無拘是非情盡凡聖皆除誰得誰失何親何疏拈頭作尾指實為虗翻身魔界轉腳邪塗了無逆順不犯工夫公邀悅至建昌途中一一伺察有十頌敘其事悅亦有十頌酬之時元祐八年八月也悅又設三問問學者一曰撥草參玄只圖見性即今性在什麼處公頌曰陰森夏木杜鵑鳴日破浮雲宇宙清莫對曾參問曾晢從來孝子諱爺名二曰識得自性方脫生死眼光落地時作麼生脫公頌曰人間鬼使符來取天下花冠色正萎好箇轉身時節子莫教閻老等間知三曰脫得生死便知去處四大分離向什麼處去公頌曰鼓合東村李大妻西風曠野淚沾衣碧蘆紅蓼江南岸却作張三坐釣磯蓋得悅爐韛為多公嘗問覺範洪禪師汾陽臨濟五世嫡孫也今其法派皆謂三玄三要一期建立語但於諸法不生異見一切平常即是祖意是否慈明接人亦多舉汾陽十智同真話願遂聞其説覺範曰十智同真與三玄三要同一關棙諸方祇愛平實見解不信有悟門使汾陽再生親為剖析亦以為非矣公嗟咨久之曰然乃其旨趣豈無方便覺範答偈曰十智同真面目全於中一智是根源若人欲見汾陽老劈破三玄作兩邊公又問臨濟四種賓主法門覺範答文長不載公尤喜接引尊宿曾薦浩布裩知大陽院事未幾復請浩住玉泉開堂日衆官畢集浩顧視大衆曰君不見又曰君不見公操蜀音曰和尚見浩應聲曰但得相公見便了即下座公又訪璣道者於洪之翠巖璣門迎公問如何是翠巖境璣答曰門近洪崖千尺井石橋分水繞松杉公握璣手曰聞道者名素矣何能作此祇對璣曰適然耳公微笑仍哦曰野僧迎客下煙嵐試問如何是翠巖後便以前二句足之林下相傳為盛事先是公在慧林一僧談禪不肯諸方公問蜆子答祖師西來意乃曰神前酒臺槃意旨如何其僧張目直視曰神前酒臺槃公戲之曰廟中是夕有燈則已不然蜆子佛法遂為虗施其入遊戲三昧又皆此髏政和間公被謫渚宮會峨眉中峰民師特過訪之議論教乘公極嘆賞聞民充夾山座元公致書佛果勤禪師曰民座主捨義學開宗眼如波斯珍寶滿船遇風到岸矣勤亦喜出峽南遊順流下荊門當是時公以道學自居少見推許勤艤舟謁之劇談華嚴旨要曰華嚴現量境界理事全真初無假法所以即一而萬了萬為一一復一萬復萬浩然莫窮心佛衆生三無差別卷舒自在無礙圓融此雖極則終是無風匝匝之波公於是不覺促榻勤遂問曰到此與祖師西來意為同為別公曰同矣勤曰且得沒交涉公色為之慍勤曰不見雲門道山河大地無絲毫過患猶是轉句直得不見一色始是半提更須知有向上全提時節彼德山臨濟豈非全提乎公乃首肯翌日復舉事法界理法界至理事無礙法界勤又問此可説禪乎公曰正好説禪也勤笑曰不然正是法界量裏在蓋法界量未滅若到事事無礙法界法界量滅始好説禪如何是佛乾屎橛如何是佛麻三斤是故真淨偈曰事事無礙如意自在手把豬頭口誦淨戒趂出淫坊未還酒債十字街頭解開布袋公曰美哉斯論夫豈易聞乎於是以師禮留居碧巖初泐潭準禪師示滅也大慧求塔銘于公相見次公問上人祇麼著草鞋遠來曰某數千里行乞來見相公公曰年多少曰二十八公曰水牯牛年多少曰兩箇公曰什麼處學得遮虗頭來曰今日親見相公公笑曰且坐喫茶才坐復問遠來有何事大慧趨前曰準和尚示寂茶毗目睛牙齒數珠不壞舍利無數山中耆舊皆欲相公大手筆作塔銘激勵後學特特遠來公曰有一問上人若道得即做若道不得與錢五貫褁足歸兜率參禪去曰請相公問公曰聞準老眼睛不壞是否曰是公曰我不問者箇眼睛曰問什麼眼睛公曰問金剛眼睛曰若是金剛眼睛在相公筆頭上公曰老夫為他點出光明令照天照地去也公又問爾師準吾知之久矣爾不遠辛苦而來於準亦有得乎大慧曰若有得則不來見大丞相也公曰咄者掠虗漢異日語大慧曰余閲雪竇拈古至百丈再參馬祖因緣曰大冶精金應無變色投卷嘆曰審如是豈得有臨濟今日耶遂作頌曰馬師一喝大雄峰深入髑髏三日聾黃檗聞之驚吐舌江西從此立宗風後平禪師遣書求頌本余作頌寄之曰吐舌耳聾師已曉捶胸祇得哭蒼天盤山會裏翻筋斗到此方知普化顛諸方往往以余聰明博記少知余者師自江西法窟來必辨優劣試為老夫言之大慧曰居士見處與真淨死心合真淨頌曰客情步步隨人轉有大威光不能現突然一喝雙耳聾那吒眼開黃檗面死心拈曰雲巖要問雪竇既是大冶精金應無變色為甚麼却三日耳聾諸人要知麼從前汗馬無人識祇要重論蓋代功公拊几曰不因公語爭見真淨死心用處若非二大老難顯雪竇馬師爾且述偈曰馬師喝下立宗風嗟我三人見處同海上六鰲吞餌去栖蘆誰更問漁翁公於宣和四年十一月黎明口占遺表命子弟書之更作偈曰幻質朝章八十一漚生漚滅無人識撞破虗空歸去來鐵牛入海無消息言訖俄取枕擲門窗上聲如雷震衆視之已薨矣公有頌古護法論行於世公見雲巖和忠道者牧牛頌曰兩角指天四足踏地拽斷鼻繩牧甚尿屁甚為擊節公一日問大慧佛具正遍知亦有漏處吾儒尚云西方有聖人堯舜禹湯皆聖人也佛何故略不及之大慧曰佛且以梵王帝釋為凡夫即餘可知矣公曰何以知之大慧曰吾教備言佛出世時則梵王前引帝釋後隨公大擊節以為高論張文定謂王荊公曰孔孟後豈無人惟儒門淡薄收拾不住故獨鍾于馬祖諸老耳公曰達者之言也公注海眼經其説八成就如是我聞一時云事無不是之謂如理無不如之謂是三界獨尊之謂我心洞十方之謂聞多之所宗之謂一一之所起之謂時大慧云自來無人如此説宋侍郎李彌遜嗣法圓悟勤李彌遜號普現居士少時讀書五行俱下年十八中鄉舉登第京師旋歷華要二十八歲為中書舍人常入圓悟室一日早朝回至天津橋馬躍忽有省通身汗流直造天寧適悟出門遙見便喚曰居士且喜大事了畢公厲聲曰和尚眼花作甚麼悟便喝公亦喝於是機鋒迅捷凡與悟問答當機不讓公後遷吏部乞祠祿歸閩連江築菴自娛忽一日示微恙遽索湯沐浴畢遂趺坐作偈曰謾説從來牧護今日分明呈露虗空拶倒須彌説甚向上一路擲筆而逝宋給事馮楫嗣法龍門遠馮楫字濟川蜀遂寧人官給事號不動居士自壯扣諸名宿雖在仕塗不忘學佛最後居龍門從佛眼遠禪師再歲一日同遠經行法堂偶童子趨庭吟曰萬象之中獨露身遠拊公背曰好聻公於是契入紹興丁巳除給事會大慧禪師就明慶開堂大慧下座公挽之曰和尚每言於士大夫曰此生決不作這蟲豸今日因甚却納敗關大慧曰盡大地是個杲上座你向甚處見他公擬對大慧掌之公曰是我招得後白楊順和尚聞之代公擎起掌云念你作新長老又代大慧提起袈裟云幾多人要不能得在越月特丐祠坐夏徑山榜其室曰不動軒一日大慧升座舉藥山問石頭曰三乘十二分教某甲粗知承聞南方直指人心見性成佛實未明了伏望慈悲示誨石頭曰恁麼也不得不恁麼也不得恁麼不恁麼總不得你作麼生藥山罔措石頭曰子緣不在此可往江西見馬大師去藥山至馬祖處亦如前問馬祖曰有時教伊揚眉瞬目有時不教伊揚眉瞬目有時教伊揚眉瞬目者是有時教伊揚眉瞬目者不是藥山大悟大慧拈罷公隨至方丈曰適來和尚所舉底因緣某理會得了大慧曰你如何會公曰恁麼也不得囌嚧娑婆訶不恁麼也不得㗭唎娑婆訶恁麼不恁麼總不得囌嚧㗭唎娑婆訶大慧印之以偈曰梵語唐言打成一塊咄哉俗人得此三昧大慧又舉似尼妙總妙總曰曾見郭象注莊子識者曰却是莊子注郭象大慧見其語異復舉巖頭婆子話問之妙總答偈曰一葉扁舟泛渺茫呈橈舞棹別宮商雲山海月都拋却贏得莊周蝶夢長大慧休去以語公公疑其所悟不根後過無錫招至舟中問曰婆生七子六箇不遇知音祇這一箇也不消得便棄水中大慧老師言道人會得且如何會妙總曰已上供通並是詣實公大驚烏龍長老訪公説話次公問昔有官人問泗州大聖曰師何姓大聖曰姓何曰住何國大聖曰住何國此意如何烏龍曰大聖本不姓何亦不是何國人乃隨緣化度耳公笑曰大聖決定姓何住何國如是往返數次後致書於大慧乞斷此公案大慧曰有六十棒將三十棒打大聖不合道姓何三十棒打濟川不合道大聖決定姓何若是烏龍長老教自領出去其論遂定大慧一日過明月庵見壁間畫髑髏公因有頌曰尸在這裡其人何在乃知一靈不居皮袋大慧不肯別作頌曰即此形骸便是其人一靈皮袋皮袋一靈公益歎服公後知邛州所至宴晦無倦嘗自詠曰公事之餘喜坐禪少曾將脅到牀眠雖然現出宰官相長老之名四海傳紹興二十三年秋乞休致預報親知期以十月三日告終至日令後廳置高座見客如平時至辰巳間具衣冠降階望闕肅拜請漕使攝邛事著僧衣履踞高座囑諸官吏及道俗各宜向道扶持教門建立法幢遂拈拄杖按膝蛻然而化漕使請曰安撫去住如此自由何不留一頌公張目索筆書曰初三十一中九下七老人言盡龜哥眼赤書畢竟爾長往建炎後名山巨剎教藏多不存公屢以己俸印施凡一百二十八藏門人蒲大聘嘗志其事有語録頌古行於世宋侍郎張九成嗣法徑山杲張九成字子韶杭州鹽官人號無垢居士歷官禮部侍郎未第時因客談楊文公呂微仲諸儒皆由禪學而至心慕之聞寶印楚明禪師道傳大通居淨慈請問入道之要楚明曰此事唯念念不捨久久純熟時節到來自然證入復舉趙州柏樹之話令時時提撕久之無省辭謁善權清禪師問此事人人有分箇箇圓成是否清曰然曰為甚某無入處清於袖中出數珠曰此是誰底公俯仰無對清復袖之曰是汝底則拈取去才涉思惟即不是汝底公悚然未幾留蘇氏館一夕如廁以柏樹子話究之聞蛙鳴釋然契入有偈曰春天月夜一聲蛙撞破乾坤共一家正恁麼時誰會得嶺頭腳痛有玄沙屆明謁法印一禪師機語頗契適私忌就明靜庵供雲水主僧惟尚才見乃展手公便喝惟尚批公頰公趨前惟尚曰張學録何得謗大般若公曰某見處祇如此和尚又作麼生惟尚舉馬祖升堂百丈卷席話詰之馬祖升堂衆才集百丈出卷席祖便下座敘語未終公推倒卓子惟尚大呼張學録殺人公躍起問傍僧曰汝又作麼生僧罔措公毆之顧惟尚曰祖禰不了殃及兒孫惟尚大笑公獻偈曰卷席因緣也大奇諸方聞舉盡攢眉臺盤躍倒人星散直漢從來不受欺惟尚答曰從來高價不饒伊百戰場中奮兩眉奪角衝關君會也叢林誰敢更相欺紹興癸丑魁多士復謁惟尚於東庵惟尚曰浮山圓鑑曰饒你入得汾陽室始到浮山門亦未見老僧在公作麼生公叱侍僧曰何不祇對僧罔措公打僧一掌曰蝦蟆窟裏果沒蛟龍丁巳秋大慧董徑山學者仰如星斗公閲其語要歎曰是知宗門有人持以語惟尚恨未一見及為禮部侍郎偶參政劉公請大慧説法于天竺公三往不值暨大慧報謁公見但寒暄而已大慧亦默識之尋奉祠還里至徑山與馮給事諸公議格物大慧曰公祇知有格物而不知有物格公茫然大慧大笑公曰師能開諭乎大慧曰不見小説載唐人有與安祿山謀叛者其人先為閬守有畫像在焉明皇幸蜀見之怒令侍臣以劍擊其像首時閬守居陝西首忽墮地公聞頓領深旨題不動軒壁曰子韶格物妙喜物格欲識一貫兩箇五百大慧始許可後守邵陽丁父艱過徑山飯僧秉鈞者詆大慧議及朝政遂竄大慧於衡陽令公居家守服服除安置南安丙子春蒙恩北還道次新淦而大慧適至與聯舟劇談宗要未嘗語往事于氏心傳録曰憲隨舅氏自嶺下歸新淦因會大慧舅氏令拜之憲曰素不拜僧舅氏曰汝姑叩之憲知其嘗執卷遂舉中庸天命之謂性三句以問大慧曰凡人既不知本命元辰下落處又要牽好人入火坑如何聖賢於打頭一著不鑿破憲曰吾師能為聖賢鑿破否大慧曰天命之謂性便是清淨法身率性之謂道便是圓滿報身修道之謂教便是千百億化身憲以告舅氏曰子拜何辭繼鎮永嘉丁丑秋丐祠枉道訪大慧於育王越明年大慧得旨復領徑山謁公於慶善院公曰某每於夢中必誦語孟何如大慧舉圓覺曰由寂靜故十方世界諸如來心於中顯現如鏡中像公曰非師莫聞此論也其頌黃龍三關黃龍嘗問僧曰人人盡有生緣上座生緣在何處正當問答却復伸手曰我手何似佛手又問諸方參請所得却復埀腳曰我腳何似驢腳示此三問莫有契旨叢林謂之黃龍三關曰我手何似佛手天下衲僧無口縱饒撩起便行也是鬼窟裏走諱不得我腳何似驢腳又被黐膠粘著翻身直上兜率天已是遭他老鼠藥吐不出人人有箇生緣處鐵圍山下幾千年三災直到四禪天這驢猶自在旁邊煞得工夫公設心六度不為子孫計因取華嚴善知識日供其二回食以飯緇流嘗供十六大天而諸位茶杯悉變為乳書偈曰稽首十方佛法僧稽首一切護法天我今供養三寶天如海一滴牛一毛有何妙術能感格試借意識為汝説我心與佛天無異一塵才起大地隔儻或塵銷覺圓淨是故佛天來降臨我欲供佛佛即現我欲供天天亦現佛子若或生狐疑試問此乳何處來狐疑即塵塵即疑終與佛天不相似我今為汝掃狐疑如湯沃雪火銷氷汝今微有疑與惑子便到新羅國宋知府葛郯嗣法靈隱遠葛郯字謙問官知府少擢上第玩意禪悅首謁無菴全禪師問道無菴令究即心即佛久無所契請曰有何方便使郯得入無菴曰居士太無厭生已而佛海來居劒池公因從遊乃舉無菴所示語請為衆普説佛海發揮之曰即心即佛眉拖地非心非佛雙眼橫蝴蝶夢中家萬里杜鵑枝上月三更留旬日而後返一日舉不是心不是佛不是物爐然頓悟頌曰非心非佛亦非物五鳳樓前山突兀豔陽影裏倒翻身野狐跳入金毛窟無菴肯之即遣書呈佛海佛海報曰此事非紙筆可既居士能過我當有所聞遂復至虎丘佛海迎之曰居士見處止可入佛境界入魔境界猶未得在公加禮不已佛海正容曰何不道金毛跳入野狐窟公乃痛領公嘗問諸禪曰夫婦二人相打通兒子作證且道證父即是證母即是或菴禮禪師著語曰小出大遇淳熙六年守臨川八月感微疾索筆大書曰大洋海裏打鼓須彌山上聞鐘業鏡忽然撲破翻身透出虗空召僚屬示之曰生死如晝夜無足怪者若以道論安得生死若作生死會去道遠矣語畢端坐而化宋放牛居士余公嗣法無門開放牛居士余公杭州人自幼遍參諸方宋淳祐間參無門開公佛眼禪師凡開口被無門劈面截住連道不是不是居士退而思曰許多年下工夫豈無歡喜處也曾零零碎碎悟來終不伏無門道不是不是及見臭菴遂扣之曰吾師得無門甚麼見解敢對人天顛倒是非臭菴曰我在無門座下無法可得無道可傳祇得兩箇字居士問曰兩字如何説臭菴曰不是不是居士遂徹悟乃曰今日始知無門老人為人處一點惡水不曾輕灑著人因述是非關行於世嘗曰大聰明人才聞此事便將心意識領解所以認影為真執空求實無有悟處臘月三十日眼光欲落時向閻羅老子道待我澄心攝念却來與你去斷不可也須是急參急悟始得又曰應以居士身得度者即現居士身而為説法是法平等不離本心十方三界六道四生萬別千差皆歸當念看經食素布施消災不隔纖毫臨官治政事主奉親有何不可若乃妄談般若説法安身誑惑人天隨業受報色身與法身無異我性與佛性一同但要識得本心便可出離生死把攬放船不是不是臭菴讚曰放牛居士述是非關大似醉漢罵街孰敢嬰其鋭惟眼裏聞聲者識是醒時語
