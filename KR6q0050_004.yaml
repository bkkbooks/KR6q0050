body:
  text: 徑山語風老人圓信較定無地地主人郭凝之彚編楊衒之北魏楊衒之為期城太守早慕佛乘達磨至魏住禹門千聖寺衒之問曰弟子歸心三寶亦有年矣而智慧昏蒙尚迷真理願師慈悲開示宗旨達磨說偈曰亦不覩惡而生嫌亦不觀善而勤措亦不捨智而近愚亦不拋迷而就悟達大道兮過量通佛心兮出度不與凡聖同躔超然名之曰祖衒之悲喜交并曰惟願久住世間化導羣有宋雲宋雲北魏使者胡太后使同比丘慧生如西域求佛經行四千里至赤嶺始出魏境又西行再期至乾羅國得佛書百七十部而還過𦵇嶺見達磨隻履翩翩獨逝雲問師何往曰西天去雲歸具說其事時達磨先已死門徒發其墓但有隻履而已向居士向居士幽棲林野木食磵飲北齊天保初聞二祖盛化乃致書曰影由形起響逐聲來弄影勞形不識形為影本揚聲止響不知聲是響根除煩惱而趨涅槃喻去形而覓影離眾生而求佛果喻默聲而求響故知迷悟一塗愚智非別無名作名因其名則是非生矣無理作理因其理則爭論起矣幻化非真誰是誰非虗妄無實何空何有將知得無所得失無所失未及造謁聊申此意伏望答之二祖回示曰備觀來意皆如實真幽之理竟不殊本迷摩尼謂瓦礫豁然自覺是真珠無明智慧等無異當知萬法即皆如愍此二見之徒輩申辭措筆作斯書觀身與佛不差別何須更覓便無餘居士捧披祖偈乃申禮覲密承印記崔趙公崔趙公逸其名問國一欽禪師曰弟子今欲出家得否國一曰出家乃大丈夫事非將相之所能為公於是有省楊光庭唐天寶三年玄宗遣中使楊光庭入司空山採常春藤因造本淨禪師丈室禮問曰弟子慕道斯久願和尚慈悲略垂開示淨曰天下禪宗碩學咸會京師天使歸朝足可咨決貧道隈山傍水無所用心光庭泣拜淨曰休禮貧道天使為求佛邪問道邪曰弟子智識昏昧未審佛之與道其義云何淨曰若欲求佛即心是佛若欲會道無心是道曰云何即心是佛淨曰佛因心悟心以佛彰若悟無心佛亦不有曰云何無心是道淨曰道本無心無心名道若了無心無心即道光庭作禮信受杜鴻漸杜鴻漸字子巽濮州濮陽人家世奉佛為靈武定策功臣後以宰相鎮撫益州遣使詣白崖山請無住禪師入城問法曰弟子聞和尚說無憶無念無妄三句法門未審是一是三無住曰無憶名戒無念名定無妄名慧一心不生即具戒定慧非一非三也公曰後句妄字莫是從心之忘乎曰從女者是公曰有據否曰法句經云若起精進心是妄非精進若能心不妄精進無有涯公又問師還以三句示人否無住曰初心學人還令息念澄停識浪水清影現悟無念體寂滅現前無念亦不立也於時庭樹鵶鳴無住問相公聞否曰聞鵶去又問今聞否曰鵶去無聲云何言聞無住曰聞與不聞非關聞性有聲之時是聲塵自生無聲之時是聲塵自滅而此聞性不隨聲生不隨聲滅悟此聞性即免聲塵之所流轉乃至色香味觸亦復如之公喜躍稱善又問何名第一義第一義者從何次第得入無住曰第一義無有次第亦無出入世諦一切有第一義即無諸法無性性說名第一義佛言有法名俗諦無性第一義公曰如師開示實不可思議公又曰弟子性識微淺昔因公暇撰得起信論章疏兩卷可得稱佛法否無住曰一切法從本以來離言說相離名字相離心緣相畢竟平等無有變異唯有一心故名真如今相公著言說相著名字相著心緣相既著種種相云何是佛法公又問云何不生云何不滅如何得解脫無住曰見境心不起名不生不生即不滅既無生滅即不被前塵所縛當處解脫不生名無念無念即無滅無念即無縛無念即無脫舉要而言識心即離念見性即解脫離識心見性外更有法門證無上菩提者無有是處公曰何名識心見性無住曰一切學道人隨念流浪葢為不識真心真心者念生亦不順生念滅亦不依寂不來不去不定不亂不取不捨無為無相活潑潑平常自在此心體畢竟不可得無可知覺觸目皆如無非見性也公繇是益棲心禪悅自蜀還食千僧大曆四年辭宰相臨終沐浴命朝服加僧伽梨剃鬚髮別眾而逝遺命依浮屠法焚軀為塔以塟不為封樹鄴侯李泌鄴侯李泌微時在衡岳寺中讀書聞懶殘禪師中宵梵唱響徹山林一夕公潛往道名瞻拜殘大詬曰是將賊我公拜益恭殘撥牛糞火中出一芋以半授公啗之公捧食再拜謝殘曰慎勿多言領取十年宰相張濆行者南陽張濆行者問於忠國師曰承和尚說無情說法某甲未體其事乞和尚垂示國師曰汝若問無情說法解他無情方得聞我說法汝但聞取無情說法去魚軍容魚軍容問於忠國師曰師住白崖山十二時中如何修道國師喚童子來摩頂曰惺惺直言惺惺歷歷直言歷歷已後莫受人謾軍容無語密雲悟代云不問那知李渤李渤字濬之為江州刺史日甞問歸宗常禪師曰須彌納芥子即不問如何是芥子納須彌歸宗曰人傳使君讀萬卷書是否公曰然歸宗曰摩頂至踵如椰子大萬卷書向何處著公有省異日又問一大藏教明得箇甚麼邊事歸宗舉拳示之曰還會麼曰不會歸宗曰這箇措大拳頭也不識曰請師指示歸宗曰遇人即途中授與不遇即世諦流布崔羣相國崔羣字敦詩貝州武城人被讒出為湖南觀察使至任即訪東寺如會禪師問曰師以何得東寺曰見性得東寺方病眼公曰既云見性其奈眼何東寺曰見性非眼病眼何害公稽首謝之法眼別云是相公眼公見鳥於佛頭上放糞乃問鳥還有佛性也無東寺曰有公曰為甚麼向佛頭上放糞東寺曰是伊為甚麼不向子頭上放于頔于頔字允元代人憲宗朝拜司空同平章事初為襄州刺史與居士龐道玄相得甚驩一日詣居士問疾居士謂曰但願空諸所有慎勿實諸所無公甞問紫玉道通禪師如何是黑風吹其船舫漂墮羅剎鬼國紫玉曰于頔這客作漢問恁麼事作麼公失色紫玉乃指曰祇這便是漂墮羅剎鬼國也公又問如何是佛紫玉喚相公公應諾紫玉曰更莫別求天奇云一呼一諾賓主分明因甚麼卻墮羅剎鬼國皆因逐語隨言拋真棄覺被這黑風扇鼓萬劫漂沈焉得不為客作賤人竪起拂子云若向這裏會得頓出無明業海免宿門前草菴藥山聞之曰噫可惜于家漢生埋向紫玉山中公聞乃謁見藥山藥山曰聞相公在紫玉山中大作佛事是否公曰不敢承聞有語相救今日特來藥山曰有疑但問公曰如何是佛藥山召于頔公應諾藥山曰是甚麼公於此有省招慶共羅山舉次招慶云一等是道甚是奇特雲泥有隔羅山云大師也不得草草當時賴遇于相公可中草窠裏若撥着箇焦尾大蟲何處有藥山也招慶云作麼生羅山云還知于相是鍛了金麼韓愈韓愈字退之貶潮州後訪靈山大顛寶通禪師問曰師春秋多少大顛提起數珠曰會麼公曰不會大顛曰晝夜一百八公不曉遂回次日再來至門前見首座舉前話問意旨如何首座扣齒三下及見大顛理前問大顛亦扣齒三下公曰原來佛法無兩般大顛曰是何道理公曰適來問首座亦如是大顛乃召首座是汝如此對否首座曰是大顛便打趂出院語風信拈云大顛和尚賊過後張弓活埋他俗人雖然如是秖救得一半頌云夜深賊被狗子咬墻洞慌忙補得好補不好長安幾個知天曉公一日又問曰弟子軍州事繁佛法省要處乞師一語大顛良久公罔措時三平為侍者乃敲禪牀三下大顛曰作麼三平曰先以定動後以智拔公乃曰和尚門風高峻弟子於侍者邊得個入處燕王燕王至觀音院訪趙州從諗禪師師乃端坐不起燕王問曰人王尊耶法王尊耶師曰若在人王人王中尊若在法王法王中尊燕王唯然王鎔王鎔帥真定自稱趙王甞入東院訪趙州諗禪師趙州不起以手拍膝曰會麼鎔曰不會趙州曰自小持齋身已老見人無力下禪牀鎔尤加禮重翌日令客將傳語趙州下禪牀受之侍者曰和尚見大王來不下禪牀今日軍將來為甚麼却下禪牀趙州曰非汝所知第一等人來禪牀上接中等人來下禪牀接末等人來三門外接因侍者報大王來也趙州曰萬福大王侍者曰未到在趙州曰又道來也鎔問曰和尚尊年有幾箇齒在趙州曰祇有一箇鎔曰爭喫得物趙州曰雖然一箇下下齩著時鎔奏到命服趙州堅讓不受左右曰大王為禪師佛法故堅請師著此衣趙州曰老僧為佛法故所以不著此衣後寄拂子與鎔曰若問何處得來便說老僧平生用不盡者鎔讚師像曰碧溪之月清鏡中頭我師我化天下趙州馬大夫馬大夫問趙州曰和尚還修行也無趙州曰老僧若修行即禍事大夫曰和尚即不修行教甚麼人修行趙州曰大夫是修行底人曰某甲何名修行趙州曰若不修行爭得撲在人王位中餧得來赤凍紅地無有解出期大夫乃下淚拜謝周員外趙州問周員外你還夢見臨濟也無員外竪起拳趙州曰那邊見員外曰這邊見趙州曰什麼處見臨濟員外無對趙州又問員外什麼處來曰非來非去趙州曰不是老鵶飛來飛去劉相公劉相公入東院見趙州掃地問曰大善知識為甚麼却掃塵趙州曰從外來竺尚書竺尚書問於長沙岑曰蚯蚓斬為兩段兩頭俱動未審佛性在阿那頭長沙曰莫妄想曰爭奈動何長沙曰會即風火未散尚書無對又皓月供奉問師蚯蚓斷為兩段兩頭俱動未審佛性在阿那頭師曰動與不動是何境界曰言不干典非智者之所談祇如和尚言動與不動是何境界出自何經師曰灼然言不干典非智者之所談大德豈不見首楞嚴云當知十方無邊不動虗空并其動搖地水火風均名六大性真圓融皆如來藏本無生滅復示偈曰最甚深最甚深法界人身便是心迷者迷心為眾色悟時剎境是真心法界二塵為實相分明達此是知音又謁長沙長沙召尚書尚書應諾長沙曰不是尚書本命曰不可離却即今祇對別有第二主人長沙曰喚尚書作至尊得麼曰恁麼總不祇對時莫是弟子主人否曰非但祇對與不祇對時無始劫來是箇生死根本有偈曰學道之人不識真祇為從前認識神無量劫來生死本癡人喚作本來人妙喜曰即今祗對者既不是本來人却喚甚麼作本來人良久曰我恁麼道且作死馬醫李軍容李軍容具公裳入溈山參靈祐禪師值師泥壁次李直至師背後端笏而立溈山回首見便側泥盤作接泥勢李便轉笏作進泥勢溈山便拋下泥盤同歸方丈又別記白侍郎至廬山謁歸宗常禪師值歸宗泥壁次歸宗問云君子儒小人儒白云君子儒歸宗打泥柘一下白遂過泥歸宗接得便用良久云莫便是快俊底白侍郎麼白云不敢歸祭云祇有過泥分劉侍御劉侍御問仰山禪師了心之旨可得聞乎仰山曰若要了心無心可了無了之心是名真了朱行軍朱行軍於洛京南禪設齋入僧堂顧視曰直下是遂行香口不住道至際上座面前上座便問直下是箇甚麼行軍便喝上座曰行軍幸是會佛法底人又惡發作甚麼行軍曰喚作惡發即不得上座便喝行軍曰鉤在不疑之地上座又喝行軍便休齋退入客司請適來下喝僧來上座至便共行軍言論竝不顧諸人僧錄曰行軍適來爭容得這僧無禮行軍曰若是你諸人喝下官有劒僧錄曰某等固是不會須是他暉長老始得行軍曰若是南禪長老也未夢見在溫造溫造字簡輿并州祈人官禮部尚書甞問於圭峰密禪師曰悟理息妄之人不結業一期壽終之後靈性何依圭峰曰一切眾生無不具有覺性靈明空寂與佛無殊但以無始劫來未曾了悟妄執身為我相故生愛惡等情隨情造業隨業受報生老病死長劫輪迴然身中覺性未甞生死如夢被驅役而身本安閒如水作氷而濕性不易若能悟此性即是法身本自無生何有依託靈靈不昧了了常知無所從來亦無所去但多生妄執習以性成喜怒哀樂微細流注難以卒除須常覺察但以空寂為自體勿認色身以靈知為自心勿認妄念妄念若起都不隨之臨命終時自然業不能繫雖有中陰所向自由天上人間隨意寄託愛惡之念既泯即不受分段之身圓覺大智朗然獨存名為佛矣圭峰先有八句偈顯示此意偈曰作有義事是惺悟心作無義事是狂亂心狂亂隨情念臨終被業牽惺悟不由情臨終能轉業圭峰向公誦之公奉命解釋史山人史山人者逸其名為十問問圭峰禪師一問如何是道何以修之為復必須修成為復不假功用答無礙是道覺妄是修道雖本圓妄起為累妄念都盡即是修成二問道若因修而成即是造作便同世間法虗偽不實成而復壞何名出世答造作是結業名虗偽世間無作是修行即真實出世三問其所修者為頓為漸漸則忘前失後何以集合而成頓則萬行多方豈得一時圓滿答真理即悟而頓圓妄情息之而漸盡頓圓如初生孩子一日而肢體已全漸修如長養成人多年而志氣方立四問凡修心地之法為當悟心即了為當別有行門若別有行門何名南宗頓旨若悟即同諸佛何不發神通光明答識氷池而全水藉陽氣而鎔消悟凡夫而即真資法力而修習氷消則水流潤方呈溉滌之功妄盡則心靈通始發通光之應修心之外無別行門五問若但修心而得佛者何故諸經復說必須莊嚴佛土教化眾生方名成道答鏡明而影像千差心淨而神通萬應影像類莊嚴佛國神通則教化眾生莊嚴而即非莊嚴影像而亦色非色六問諸經皆說度脫眾生且眾生即非眾生何故更勞度脫答眾生若是實度之則為勞既自云即非眾生何不例度而無度七問諸經說佛常住或即說佛滅度常即不滅滅即非常豈不相違答離一切相即名諸佛何有出世入滅之實乎見出沒者在乎機緣機緣應則菩提樹下而出現機緣盡則娑羅林間而涅槃其猶淨水無心無像不現像非我有葢外質之去來相非佛身豈如來之出沒八問云何佛化所生吾如彼生佛既無生生是何義若言心生法生心滅法滅何以得無生法忍耶答既云如化化即是空空即無生何詰生義生滅滅已寂滅為真忍可此法無生名曰無生法忍九問諸佛成道說法祇為度脫眾生眾生既有六道佛何但住在人中現化又佛滅後付法於迦葉以心傳心乃至此方六祖每代祇傳一人既云於一切眾生皆得一子之地何以傳授不普答日月麗天六合俱照而盲者不見盆下不知非日月不普是障隔之咎也度與不度義類如斯非局人天揀於鬼畜但人道能結集傳授不絕故祇知佛現人中也滅度後委付迦葉展轉相承一人者此亦槩論當代為宗教主如土無二王非得度者唯爾數也十問和尚因何發心慕何法而出家今如何修行得何法味所行得至何處地位今住心耶修心耶若住心妨修心若修心則動念不安云何名為學道若安心一定則何異定性之徒伏願次第為說答覺四大如坏幻達六塵如空華悟自心為佛心見本性為法性是發心也知心無住即是修行無住而知即為法味住著於法斯為動念故如人入闇則無所見今無所住不染不著故如人有目及日光明見種種法豈為定性之徒既無所住著何論處所宋齊丘慧覺禪師問相國宋齊丘曰還會道麼宋曰若是道也著不得慧覺曰是有著不得是無著不得宋曰總不恁麼慧覺曰著不得底聻宋無對王審知王審知字信通光州人梁封閩王王甞延雪峰存玄沙備二禪師入府求示心法乃曰大王志心聽取幻化空身是大王法身知見覺了是大王自性觀心無心從妄想起我心自空即悟實相已知本性則一時放下不得別生絲毫許也王禮二師曰吉生慶幸得逢指示王問玄沙曰此一真心本無生滅今此一身從何而有玄沙曰此本源真性徧周法界為妄想故而一點識性從父母妄緣而生受千般苦身有輪迴大王既知覺了不落惡趣但請大王頻省妄想歸真合道王作禮喜受王延鈞王延鈞審知次子素奉佛法度僧一萬人由是閩中多僧甞請羅山和尚開堂說法陞座斂衣左右顧視便下座王近前執羅山手曰靈山一會何異今日羅山曰將謂你是個俗漢又請夢筆和尚齋問曰和尚還將得筆來也無夢筆曰不是稽山繡管慙非月裏兔毫大王既垂顧問山僧敢不通呈又問如何是法王曰不是夢筆家風陳尚書雲門到江州有陳尚書者請齋纔見便問儒書中即不問三乘十二分教自有座主作麼生是衲僧行脚事雲門曰曾問幾人來尚書曰即今問上座雲門曰即今且置作麼生是教意尚書曰黃卷赤軸雲門曰這箇是文字語言作麼生是教意尚書曰口欲談而辭喪心欲緣而慮忘雲門曰口欲談而辭喪為對有言心欲緣而慮忘為對妄想作麼生是教意尚書無語雲門曰見說尚書看法華經是否尚書曰是雲門曰經中道一切治生產業皆與實相不相違背且道非非想天有幾人退位尚書無語雲門曰尚書且莫草草三經五論師僧拋却特入叢林十年二十年尚不奈何尚書又爭得會尚書禮拜曰某甲罪過韋監軍韋監軍來謁玄沙乃曰曹山和尚甚奇怪玄沙曰撫州取曹山幾里韋指傍僧曰上座曾到曹山否曰曾到韋曰撫州取曹山幾里曰百二十里韋曰恁麼則上座不到曹山韋却起禮拜玄沙曰監軍却須禮此僧此僧却具慚愧雲居錫云甚麼處是此僧具慙愧若撿得出許上座有行脚眼玄沙一日與韋監軍喫菓子韋問如何是日用而不知玄沙拈起菓子曰喫韋喫菓子了再問玄沙曰祇這是日用而不知陳尚書陳尚書問洞山价五十二位菩薩中為甚麼不見妙覺洞山曰尚書親見妙覺節度使成汭荊南節度使成汭入山設供問雲居膺禪師曰世尊有密語迦葉不覆藏如何是世尊密語雲居召尚書尚書應諾雲居曰會麼尚書曰不會雲居曰汝若不會世尊有密語汝若會迦葉不覆藏劉禹端劉禹端問雲居膺禪師曰雨從何來雲居曰從端公問處來公歡喜讚歎雲居却問公雨從何來公無語有老宿代云適來道甚麼歸宗柔別云謝和尚再三張覇遷信士張覇遷問疎山匡仁禪師曰和尚有何言句踈山示偈曰吾有一寶琴寄之在曠野不是不解彈未遇知音者劉翁青林師䖍禪師在洞山栽松次有劉翁求偈師作偈曰長長三尺餘覆青草不知何代人得見此松老劉得偈呈洞山洞山謂曰此是第三代洞山主人鍾司徒頴橋安鐵胡一日在風穴團爐內坐有鍾司徒來見便問三界焚燒如何出得安將火匙撥開火鍾擬議安曰司徒司徒鍾忽有省陶穀給事中陶穀入東京普淨院致禮常覺禪師問曰經云離一切相則名諸佛今目前諸相紛然如何離得覺曰給事見箇甚麼陶欣然仰重李相公李相公至南嶽問福巖審承禪師如何是祖師西來意師指庭前柏樹公如是三問師如是三答公欣然乃有頌曰出沒雲閑滿太虗元來真相一塵無重重請問西來意唯指庭前柏一株李王清凉文益禪師一日與李王論道罷同觀牡丹花王命作偈清凉即賦曰擁毳對芳叢由來趣不同髮從今日白花是去年紅豔冶隨朝露馨香逐晚風何須待零落然後始知空王頓悟其意宋令公宋令公為洪州太守一日大寧寺僧陳乞請第二座開堂公曰何不請第一座眾無語法眼代云不勞如此馮延巳馮延巳為江南相與數僧遊鍾山至一人泉問一人泉許多人爭得足一僧對曰不教欠少延巳不肯乃別曰誰人欠少法眼別云誰是不足者李崇矩開寶中樞密使李崇矩巡護南方因入院覩地藏菩薩像問僧地藏何以展手僧曰手中珠被賊偷却也李却問圓明禪師既是地藏為甚麼遭賊明曰今日捉下也李禮謝之歐陽修歐陽修諡文忠聞浮山遠禪師奇逸造其室未有以異之與客碁浮山坐其旁文忠遽收局請因碁說法浮山即令撾鼓陞座曰若論此事如兩家著碁相似何謂也敵手知音當機不讓若是綴五饒三又通一路始得有一般底祇解閉門作活不會奪角衝關硬節與虎口齊彰局破後徒勞綽斡所以道肥邊易得瘦肚難求思行則往往失粘心粗而時時頭撞休誇國手謾說神仙贏局輸籌即不問且道黑白未分時一著落在甚麼處良久曰從來十九路迷悟幾多人文忠嘉歎從容謂同僚曰修初疑禪語為虗誕今日見此老機緣所得所造非悟明於心地安能有此妙旨哉後官洛中一日遊嵩山却去僕吏放意而往至一山寺入門修竹滿軒霜清鳥啼風物鮮明文忠休於殿陛旁有老僧閱經自若與語不甚顧答文忠異之曰道人住山久如對曰甚久也又問誦何經對曰法華經文忠曰古之高僧臨生死之際類皆談笑脫去何道致之耶對曰定慧力耳又問今乃寂寥無有何哉老僧笑曰古之人念念在定慧臨終安得亂今之人念念在散亂臨終安得定文忠大驚不自知膝之屈也謝希深甞作文記其事呂許公丞相呂許公謁法華志言大士問佛法大意法華曰本來無一物一味却成真王質集僊王質問如何是祖師西來意法華曰青山影裡潑藍起寶塔高吟撼曉風又曰請法華燒香法華曰未從齋戒覓不向佛邊求徐岳國子助教徐岳問祖師西來意法華曰街頭東畔底徐曰某甲未會法華曰三般人會不得王安石王安石字介甫相仁宗封荊國公時吳山端禪師在京師公請講禪就大相國寺設齋公入院焚香畢問諸方云佛未出世時看甚麼經眾無語端曰相公周孔未出世時讀甚麼書公曰伶俐衲僧端又偈曰南無觀世音說出種種法眾生業海深所以難救拔古今沉沒者聲聲怨菩薩時公在朝更新庶務故作偈云云公平時見端偈語稱賞之曰有本者如是洪覺範曰王文公方大拜賀客塞門公默坐甚久忽題於壁間曰霜筠雪竹鍾山寺投老歸歟寄此生又元宵賜宴於相國寺觀俳優坐客懽甚公作偈曰諸優戲場中一貴復一賤心知本是同所以無欣怨子甞謂同學曰此老人通身是眼滿渠一點也不得武昌劉居士雲居舜老夫初參洞山一日如武昌行乞首謁劉居士居士曰老漢有一問若相契即請開疏若不相契即請還山遂問古鏡未磨時如何舜曰黑似漆磨後如何舜曰照天照地居士長揖曰且請上人還山舜懡㦬而歸洞山問其故舜述前語洞山曰汝問我舜理前問洞山曰此去漢陽不遠進後語洞山曰黃鶴樓前鸚鵡洲舜於言下大悟李端愿李端愿居士世以佛學名慧林宗本禪師問曰十方同聚會箇箇學無為既曰無為作麼生學李無對葉清臣蔣侍郎內翰葉清臣牧金陵迎惟正禪師語道一日葉曰明日府有燕飲師固奉律能為我少留一日款請話否正諾之翌日遣使邀正留一偈而返曰昨日曾將今日期出門倚杖又思惟為僧祗合居巖谷國士筵中甚不宜坐客皆仰其標致杭守蔣侍郎亦與正為方外交每往謁至郡庭下犢譚笑終日而去蔣有詩曰禪客尋常入舊都黃牛角上挂缾盂有時帶雪穿雲去便好和雲畵作圖陳瓘陳瓘字退夫初赴省闈問於宗道者曰瓘此行欲作狀元得否宗熟視曰無時即得退夫竟以第三名上第而時彥者作魁宋太尉陳良弼陳良弼官太尉請淨因圓悟法真慈受并十大法師禪講千僧赴府齋會時徽宗皇帝私幸觀之太史魯國公亦與焉有善華嚴者乃賢首宗之義虎也對眾問諸禪曰吾佛設教自小乘至於圓頓掃除空有獨證真常然後萬德莊嚴方名為佛甞聞禪宗一喝能轉凡成聖則與諸經論似相違背今一喝若能入吾宗五教是為正說若不能入是為邪說諸禪視淨因淨因曰如法師所問不足諸大禪師之酬淨因小長老可以使法師無惑也淨因召善善應諾淨因曰法師所謂愚法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不有而有不空而空義也如我一喝非唯能入五教至於工巧技藝諸子百家悉皆能入淨因乃震聲一喝曰聞麼善曰聞淨因曰汝既聞則此一喝是有能入小乘教須臾又問善曰聞麼曰不聞淨因曰汝既不聞適來一喝是無能入始教遂顧善曰我初一喝汝既道有喝久聲銷汝復道無道無則元初實有道有則而今實無不有不無能入終教我有喝之時有非是有因無故有無喝之時無非是無因有故無即有即無能入頓教須知我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫徧虗空即此一喝入百千萬億喝百千萬億喝入此一喝是故能入圓教善乃起再拜淨因復謂曰非唯一喝為然乃至一語一默一動一靜從古至今十方虗空萬象森羅六道四生三世諸佛一切聖賢八萬四千法門百千三昧無量妙義契理契機與天地萬物一體謂之法身三界唯心萬法唯識四時八節陰陽一致謂之法性是故華嚴經云法性徧在一切處有相無相一聲一色全在一塵中含四義事理無邊周遍無餘參而不雜混而不一於此一喝中皆悉具足猶是建化門庭隨機方便謂之小歇場未至寶所殊不知吾祖師門下以心傳心以法印法不立文字見性成佛有千聖不傳底向上一路在善又問曰如何是向上一路淨因曰汝且向下會取善曰如何是寶所淨因曰非汝境界善曰望禪師慈悲淨因曰任從滄海變終不為君通善膠口而退聞者靡不歎仰皇帝顧謂近臣曰禪宗玄妙深極如此淨因才辯亦罕有也近臣奏曰此宗師之緒餘李朝請李朝請與甥薌林居士向子諲謁道場琳禪師遂問家賊惱人時如何琳曰誰是家賊李竪起拳琳曰賊身已露李曰莫荼糊人好琳曰贓證見在李無語錢象祖錢象祖字公相錢塘人相寧宗守金陵日甞問道於保寧無用禪師又問道於護國此庵元禪師此庵曰欲究此事須得心法兩忘乃可法執未忘契理亦非悟也公曰纔涉唇吻便落意思如何此庵曰本自無瘡勿傷之也公渙然有得公甞於鄉州建接待十所皆以淨土極樂名之創上菴高僧寮為談道處自左相辭歸益修淨業偶得微疾僧有問起居者公曰不貪生不怖死不生天不生人惟當往生淨土耳言訖趺坐而化
