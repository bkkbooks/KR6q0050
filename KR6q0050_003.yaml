body:
  text: 徑山語風老人圓信較定無地地主人郭凝之彚編唐侍郎白居易嗣法佛光滿白居易字樂天久參佛光得心法兼稟大乘金剛寶戒元和四年因興善寬禪師至闕下公問曰禪師何以説法寬曰無上菩提者被於身為律説於口為法行於心為禪應用者三其致一也譬如江湖淮漢在處立名名雖不一水性無二律即是法法不離禪云何於中妄起分別公曰既無分別何以修心寬曰心本無損傷云何要修理無論垢與淨一切勿念起公曰垢即不可念淨無念可乎寬曰如人眼睛上一物不可住金屑雖珍寶在眼亦為病公曰無修無念又何異凡夫耶寬曰凡夫無明二乘執著離此二病是曰真修真修者不得勤不得忘勤即近執著忘即落無明此為心要云爾十五年公牧杭州入秦望山訪鳥窠和尚問曰禪師住處甚危險鳥窠曰太守危險尤甚公曰弟子位鎮江山何險之有鳥窠曰薪火相交識性不停得非險乎又問如何是佛法大意鳥窠曰諸惡莫作衆善奉行公曰三歲孩兒也解恁麼道鳥窠曰三歲孩兒雖道得八十老人行不得公作禮而退嘗致書于濟法師以佛無上大慧演出教理安有徇機高下應病不同與平等一味之説相反援引維摩及金剛三昧等六經闢二義而難之又以五蘊十二緣説名色前後不類立理而徵之並鈎深索隱通幽洞微復受東都凝禪師八漸之目各廣一言而為一偈釋其旨趣自淺之深猶貫珠焉凡守任處多訪祖道學無常師後為賓客分司東都罄己俸修龍門香山寺寺成自撰記凡為文動關教化無不贊美佛乘見于本集其歷官次第歸全代祀即史傳存焉唐刺史李翱嗣法藥山儼李翱字習之趙郡人刺史鼎州時慕藥山惟儼禪師道風屢請不赴乃躬謁之藥山執經不顧公遂拂袖行曰見面不如聞名藥山却呼太守公應諾藥山曰何得貴耳賤目公謝之乃問如何是道藥山以手指上下曰會麼公曰不會藥山曰雲在青天水在瓶公欣然乃呈偈曰鍊得身形似鶴形千株松下兩函經我來問道無餘説雲在青天水在瓶玄覺云且道李太守是讚他語明他語須是行腳眼始得又問如何是戒定慧藥山曰貧道這裏無此間家具公莫測玄旨藥山曰太守欲得保任此事直須向高高山頂立深深海底行閨閣中物捨不得便為滲漏張無盡頌云雲在青天水在瓶眼光隨指落深坑溪花不耐風霜苦説甚深深海底行公見老宿獨坐問曰端居丈室當何所務宿曰法身凝寂無去無來法眼別云汝作甚麼來法燈別云非公境界公問藥山何姓曰正是時公不悉却問院主某甲適來問和尚姓曰正是時未審姓甚麼院主曰恁麼則姓韓也藥山聞乃曰得恁麼不識好惡若是夏時對他便是姓熱一夕師登山忽雲開見月大嘯一聲聲落澧陽九十里許公聞之復贈詩曰選得幽居愜野情終年無送亦無迎有時直上孤峰頂月下披雲嘯一聲公嘗問龍潭信禪師曰如何是真如般若龍潭曰我無真如般若公曰幸遇和尚龍潭曰此猶是分外之言公一日問僧馬大師有甚麼言教僧曰大師或説即心即佛或説非心非佛公曰總過這邊公却問西堂藏馬大師有甚麼言教藏呼李翱公應喏藏曰鼓角動也有一僧乞置塔公問曰教中不許將尸塔下過又作麼生僧無對僧却問鵝湖義禪師義曰他得大闡提唐張拙嗣法石霜諸張拙秀才因禪月大師指參石霜石霜問秀才何姓曰姓張名拙石霜曰覓巧尚不可得拙自何來張忽有省乃呈偈曰光明寂照遍河沙凡聖含靈共我家一念不生全體現六根才動被雲遮斷除煩惱重增病趨向真如亦是邪隨順世緣無罣礙涅槃生死等空花雲門問僧光明寂照遍河沙豈不是張拙秀才語僧云是雲門云墮話也妙喜云驢揀濕處尿唐相國陸希聲謁仰山寂陸希聲蘇州吳人昭宗朝拜同中書門下平章事嘗欲謁仰山慧寂禪師先作此相封呈仰山開封於相下書曰不思而得落第二頭思而得之落第三首遂封回公見遂入山仰山乃門迎公才入門便問三門俱開從何門入仰山曰從信門入公至法堂又問不出魔界便入佛界時如何仰山以拂子倒點三下公便設禮又問和尚還持戒否仰山曰不持戒還坐禪否仰山曰不坐禪公良久仰山曰會麼曰不會仰山曰聽老僧一頌滔滔不持戒兀兀不坐禪釅茶三兩碗意在钁頭邊仰山却問承聞相公看經得悟是否曰弟子因看涅槃經有云不斷煩惱而入涅槃得箇安樂處仰山竪起拂子曰祇如這箇作麼生入曰入之一字也不消得仰山曰入之一字不為相公公便起去法燈云上座且道入之一字為甚麼人又云相公且莫煩惱唐太傅王延彬嗣法長慶稜太傅王延彬居士請長慶住招慶開堂日公朝服趨隅曰請師説法長慶曰還聞麼公設拜長慶曰雖然如此恐有人不肯一日入招慶佛殿指鉢盂問殿主這箇是甚麼鉢殿主曰藥師鉢公曰祇聞有降龍鉢殿主曰待有龍即降公曰忽遇拏雲浪來時作麼生殿主曰他亦不顧公曰話墮也玄沙云盡你神力走向甚麼處去保福云歸依佛法僧百丈恆作覆鉢勢雲門云他日生天莫孤負老僧一日公入院見方丈門閉問演侍者曰有人敢道太師在否演曰有人敢道太師不在否長慶謂太傅曰雪峰豎拂子示僧其僧便出去若據此僧合喚轉痛與一頓公曰是甚麼心行長慶曰洎合放過公到招慶煎茶朗上座與明招把銚忽翻茶銚公問茶爐下是甚麼朗曰捧爐神公曰既是捧爐神為甚麼翻却茶朗曰事官千日失在一朝公拂袖便出明招曰朗上座喫却招慶飯了却向外邊打野榸朗曰上座作麼生明招曰非人得其便雪竇顯云當時但踏倒茶爐復頌云來問若成風應機非善巧堪悲獨眼龍曾未呈牙爪牙爪開呈雲雷逆水之波經幾回唐真人呂巖嗣法黃龍機呂巖真人字洞賓京兆人也唐末三舉不第偶於長安酒肆遇鍾離權授以延命術自爾人莫之究嘗遊廬山歸宗書鐘樓壁曰一日清間自在身六神和合報平安丹田有寶休尋道對境無心莫問禪未幾道經黃龍山覩紫雲成蓋疑有異人乃入謁值黃龍擊鼓升堂黃龍見知是呂公也欲誘而進厲聲曰座傍有竊法者呂毅然出問一粒粟中藏世界半升鐺內煮山川且道此意如何黃龍指曰這守尸鬼呂曰爭奈囊有長生不死藥黃龍曰饒經八萬劫終是落空亡呂飛劒脅之劒不能入遂再拜求指歸黃龍詰曰半升鐺內煮山川即不問如何是一粒粟中藏世界呂於言下頓契作偈曰棄却瓢囊摵碎琴如今不戀汞中金自從一見黃龍後始覺從前錯用心龍囑令加護別紀呂真人遇黃龍禪師升座師曰會中有竊法者巖出曰雲水道人師曰雲盡水乾時如何巖無對師代云黃龍出現後謁潭州智度覺禪師有曰余遊韶郴東下湘江今見覺公觀其禪學精明性源淳潔促膝靜坐收光內照一衲之外無餘衣一鉢之外無餘食遠生死岸破煩惱殼方今佛衣寂寂兮無傳禪理懸懸兮幾絶扶而興者其在吾師乎聊作一絶奉記達者推心方濟物聖賢傳法不離真請師開説西來意七祖如今未有人宋丞相王隨嗣法首山念王隨字子正河南人也居嘗慕裴休之為人謁首山念禪師得言外之旨自爾履踐深明大法公以御史中丞出鎮錢塘往候興教小壽禪師至湖上去騶從獨步登寢室壽方負暄毳衣自若忽見之問曰官人何姓公曰隨姓王即拜之壽推蒲團藉地而坐語笑終日而去他日公復至寺衆橫撞大鐘萬指出迎而壽前趨立於松下公望見出輿握其手曰何不如前日相見而遽為此禮數耶壽顧左右且行且言曰中丞即得奈知事瞋何公與楊大年皆號參禪有得者大年編次傳燈録三十卷公刪去其繁為十五卷曰玉英集公臨終書偈曰畫堂燈已滅彈指向誰説去住本尋常春風掃殘雪宋夏竦嗣法谷隱聰夏竦字子喬德安人皇祐中參知政事公於谷隱聰禪師因語契機日與老衲遊偶上藍溥禪師至公問百骸潰散時那箇是長老自家底溥曰前月二十離蘄陽公休去溥却問百骸潰散時那個是相公自家底公便喝溥曰喝則不無畢竟那箇是相公自家底公答偈曰休認風前第一機太空何處著思惟山僧若要通消息萬里無雲月上時溥曰也是弄精魂宋節使李端願嗣法金山頴節使李端願居士兒時在館舍常閲禪書長雖婚宦然篤志祖道遂於後圃築室類蘭若邀達觀處之朝夕咨參至忘寢食達觀一日視公曰非示現力豈致爾哉奈無箇所入何公問曰天堂地獄畢竟是有是無請師明説達觀曰諸佛向無中説有眼見空花太尉就有裏尋無手𢳛水月堪笑眼前見牢獄不避心外聞天堂欲生殊不知欣怖在心善惡成境太尉但了自心自然無惑公曰心如何了達觀曰善惡都莫思量公曰不思量後心歸何所達觀曰且請太尉歸宅公曰祇如人死後心歸何所達觀曰未知生焉知死公曰生則某已知之達觀曰生從何來公罔措達觀起揕其胸曰祇在這裡更擬思量個甚麼公曰會得也達觀曰作麼生會公曰祇知貪程不覺蹉路達觀拓開曰百年一夢今朝方省既而説偈曰三十八歲懵然無知及其有知何異無知滔滔汴水隱隱隋堤師其歸矣箭浪東馳宋太傅高世則嗣法芙蓉楷太傅高世則字仲貽號無功初參芙蓉楷禪師求指心要芙蓉令去其所重扣己而參一日忽造微密呈偈曰懸崖撒手任縱橫大地虗空自坦平照壑輝巖不借月菴頭別有一簾明宋太守許式嗣法洞山聰許式洪州太守參洞山聰禪師得正法眼一日與泐潭澄上藍溥坐次泐潭問曰聞郎中道夜坐連雲石春栽帶雨松當時答洞山甚麼話公曰今日放衙蚤泐潭曰聞答泗州大聖在揚州出現底是否公曰別點茶來泐潭曰名不虗傳公曰和尚蚤晚回山泐潭曰今日被上藍破上藍便喝泐潭曰須是你始得公曰不奈船何打破戽斗公入上藍僧堂問首座年多少曰六十八公曰僧臘多少曰四十七夏公曰聖僧得幾夏曰與虗空齊受戒公拍板頭曰下官喫飯不似首座喫鹽多附記許式漕西蜀時謁廣慧璉適接見於佛前公曰先拜佛先拜長老廣慧曰蝦蟇吞大蟲公曰恁麼則總不拜去也廣慧曰運使話墮公曰許長老具一隻眼廣慧以衣袖便拂許曰今日看破便禮拜宋修撰曾會嗣法雪竇顯曾會字宗元官翰林學士公幼與明覺顯禪師同舍及冠異途天禧間公守池州一旦會于景德寺公遂引中庸大學參以楞嚴符宗門語句質明覺明覺曰這箇尚不與教乘合況中庸大學耶學士要徑捷理會此事乃彈指一下曰但恁麼薦取公於言下領旨天聖初公守四明以書幣迎師補雪竇既至公曰某近與清長老商量勘婆子話未審端的有勘破處也無明覺曰清長老道箇甚麼公曰又恁麼去也明覺曰清長老放過一著學士還知天下衲僧出這婆子圈䙡不得麼公曰這裏別有箇道處趙州若不勘破婆子一生受屈明覺曰勘破了也公大笑宋丞相富弼嗣法投子顒丞相富弼居士字彥國初於宗門未有所趣趙清獻公抃勉之曰伏惟執事富貴如是之極道德如是之盛福壽康寧如是之備退休間逸如是之高其所未甚留意者如來一大事因緣而已能專誠求所證悟則他日為門下賀也公自清獻警勵之後不舍晝夜力進此道聞顒禪師主投子法席冠淮甸往質所疑會顒為衆登座見其顧視如象王回旋公微有得因執弟子禮趨函丈命侍者請為入室顒見即曰相公已入來富弼猶在外公聞汗流浹背即大悟尋以偈寄圓照本曰一見顒公悟入深夤緣傳得老師心東南謾説江山遠目對靈光與妙音後奏署顒師號顒上堂謝語有曰彼一期之誤我亦將錯而就錯公作偈贊曰萬木千花欲向榮臥龍猶未出滄溟彤雲彩霧呈嘉瑞依舊南山一色青宋衛州王大夫嗣法元豐滿衛州王大夫逸其名以喪偶厭世相遂參元豐於言下知歸元豐一日謂曰子乃今之陸亘也公便掩耳既而回壇山之陽縛茆自處者三載偶歌曰壇山裏日何長青松嶺白雲鄉吟鳥啼猿作道場散髮採薇歌又笑從教人道野夫狂宋太史黃庭堅嗣法黃龍心太史山谷居士黃庭堅字魯直以般若夙習雖膴仕淡如也出入宗門未有所向好作豔詞嘗謁圓通秀禪師秀呵曰大丈夫翰墨之妙甘施於此乎秀方戒李伯時畫馬事公誚之曰無乃復置我馬腹中耶秀曰汝以豔語動天下人淫心不止馬腹中正恐生泥犂耳公悚然悔謝由是絶筆惟孳孳於道著發願文痛戒酒色但朝粥午飯而已往依晦堂乞指徑捷處晦堂曰祇如仲尼道二三子以我為隱乎吾無隱乎爾太史居常如何理論公擬對晦堂曰不是不是公迷悶不已一日山行次時巖桂盛放晦堂曰聞木樨花香麼公曰聞晦堂曰吾無隱乎爾公釋然即拜之曰和尚得恁麼老婆心切晦堂笑曰祇要公到家耳時公初有所入問晦堂此中誰可與語晦堂曰漳州權遂同晦堂往見權方督役開田公曰直歲還知露柱生兒麼權曰是男是女公擬議權揮之晦堂謂曰不得無禮權曰這木頭不打更待何時公大笑久之謁雲巖死心新禪師隨衆入室死心見張目問曰新長老死學士死燒作兩堆灰向甚麼處相見公無語死心約出曰晦堂處參得底使未著在後左官黥南道力愈勝于無思念中頓明死心所問報以書曰往年常蒙苦苦提撕長如醉夢依稀在光影中蓋疑情不盡命根不斷故望崖而退耳謫官在黥南道中晝臥覺來忽爾尋思被天下老和尚謾却多少唯有死心道人不肯乃是第一相為也後作晦堂塔銘曰某夙承記莂堪任大法道眼未圓而來瞻窣堵實深宗仰之歎乃勒堅珉敬頌遺美公復設蘋蘩之供祭之以文弔之以偈曰海風吹落楞伽山四海禪徒著眼看一把柳絲收不得和煙搭在玉欄干宋觀文王韶嗣法黃龍心觀文王韶居士字子淳出刺洪州乃延晦堂禪師問道默有所契因述投機頌曰晝曾忘食夜忘眠捧得驪珠欲上天却向自身都放下四稜榻地恰團圓晦堂深肯之宋祕書吳恂嗣法黃龍心吳恂字德夫官至祕書居晦堂入室次晦堂謂曰平生學解記憶多聞即不問你父母未生已前道將一句來公擬議晦堂以拂子擊之即領深旨呈以偈曰咄這多知俗漢咬盡古今公案忽於狼籍堆頭拾得𧏙螂糞彈明明不值分文萬兩黃金不換等間拈出示人祇為走盤難看咦晦堂答曰水中得火世還稀看著令人特地疑自古不存師弟子如今却許老胡知覺範林間録云有居士吳敦夫才敏鋭意學道自以多見知識心地明淨偶閲鄧隱峰傳見其倒卓化去而衣亦順身不褪竊疑之曰彼化之異固莫測而衣亦順之何也以問晦堂老人晦堂曰汝今衣順垂于地復疑之乎曰無所疑也晦堂笑曰此既無疑則彼倒化衣亦順體何疑之有哉敦夫言下了解故其一時應機之辨如雷如霆開警昏墊者多矣宋內翰蘇軾嗣法東林總蘇軾字子瞻因宿東林與照覺論無情話有省黎明獻偈曰溪聲便是廣長舌山色豈非清淨身夜來八萬四千偈他日如何舉示人天竺悟法師謁此庵元禪師夜語次師舉東坡宿東林偈曰也不易到此田地此庵曰尚未見路徑何言到耶曰祇如他道溪聲便是廣長舌山色豈非清淨身若不到此田地如何有這箇消息此庵曰是門外漢耳曰和尚不吝可為説破此庵曰却祇從這裡猛著精彩覷捕看若捕得他破則亦知本命元辰落著處師通夕不寐及曉鍾鳴去其祕畜以前偈別曰東坡居士太饒舌聲色關中欲透身溪若是聲山是色無山無水好愁人特以告此庵此庵曰向汝道是門外漢又曰橫看成嶺側成峰到處看山了不同不識廬山真面目只緣身在此山中未幾抵荊南聞玉泉皓禪師機鋒不可觸公擬抑之即微服求見玉泉問尊官高姓公曰姓稱乃稱天下長老底稱玉泉喝曰且道這一喝重多少公無對於是尊禮之楚石琦云玉泉是作家宗匠東坡是當世大儒驀札相逢發揮此道盡謂東坡休去稱尾無星殊不知八兩半斤總在自家手裏雖然如是也扶起玉泉只如他道這一喝重多少多少人道不得直饒道得更與一喝公謫黃州佛印住廬山歸宗為方外交及佛印移住金山公獲釋知杭州過金山值佛印入室公竟造之佛印曰此無坐處公曰暫借和尚四大作禪床佛印曰有一轉語若答得當如所請若擬議即留所繫玉帶公即置帶几上佛印曰山僧四大本空五蘊非有內翰欲於何處坐公擬議佛印呼侍者曰收取玉帶永鎮山門公過金山時有寫公照容者公戲題曰心似已灰之木身如不繫之舟問汝平生功業黃州惠州瓊州宋參政蘇轍嗣法上藍順參政蘇轍居士字子由元豐三年以睢陽從事左遷瑞州榷管之任是時洪州上藍順禪師與其父文安先生有契因往訪焉相得歡甚公咨以心法順示以搐鼻因緣已而有省作偈呈曰中年聞道覺前非邂逅相逢老順師搐鼻徑參真面目掉頭不受別鉗鎚枯藤破衲公何事白酒青鹽我是誰慚愧東軒殘月上一杯甘露滑如飴宋寺丞戴道純嗣法黃龍清戴道純字孚中官寺丞咨扣靈源一日有省乃呈偈曰杳冥源底全機處一片心花露印紋知是幾生曾供養時時微笑動香雲宋文定胡安國嗣法上封秀文定公胡安國字康侯別號草庵居士久依上封秀禪師得言外之旨崇寧中過藥山有禪人舉南泉斬貓話問公公以偈答云手握乾坤殺活機縱橫施設在臨時玉堂兔馬非龍象大用堂堂總不知又寄上封有曰祝融峰似杜城天萬古江山在目前須信死心元不死夜來秋月又同圓宋左丞范沖嗣法圓通旻范沖字謙叔一字致虗由翰苑守豫章謁圓通旻禪師曰某行將老矣宿世作何行業今生墮在金紫囊中去此事稍遠圓通呼內翰公應諾圓通曰何遠之有公躍然曰乞師再垂指誨圓通曰此去洪都有四程公佇思圓通曰見即便見擬思即差公乃豁然有省宋樞密吳居厚嗣法圓通旻吳居厚官樞密擁節歸鍾陵謁圓通旻禪師曰某頃赴省試到此過趙州關因問前住訥老透關底事如何訥曰且去做官今不覺五十餘年圓通曰曾明得透關底事麼公曰八次經過常存此念然未甚脫灑在圓通度扇與之曰請使扇公即揮扇圓通曰有甚不脫灑處公忽有省曰便請末後句圓通乃揮扇兩下公曰親切親切圓通曰吉獠舌頭三千里宋諫議彭汝霖嗣法圓通旻彭汝霖官諫議手寫觀音經施圓通圓通拈起曰這個是觀音經那個是諫議經公曰此是某親寫圓通曰寫底是字那箇是經公笑曰却了不得也圓通曰即現宰官身而為説法公曰人人有分圓通曰莫謗經好公曰如何即是圓通舉經示之公拊掌大笑曰嗄圓通曰又道了不得公禮拜宋中丞盧航嗣法圓通旻盧航官至中丞與圓通擁爐次公問諸家因緣不勞拈出直截一句請師指示圓通厲聲指曰看火公急撥衣忽大悟謝曰灼然佛法無多子圓通喝曰放下著公應喏喏宋左司都貺嗣法圓通旻都貺官左司問圓通曰是法非思量分別之所能解當如何湊泊圓通曰全身入火聚公曰畢竟如何曉會圓通曰驀直去公沈吟圓通曰可更喫茶麼公曰不必圓通曰何不恁麼會公契旨曰元來太近圓通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處圓通曰咦猶有這箇在公曰乞師再垂指示圓通曰便恁麼去鐺是鐵鑄公頓首謝之宋比部孫居士嗣法楊岐會比部孫居士因楊岐會禪師來謁值視斷次公曰某為王事所牽何由免離楊岐指曰委悉得麼公曰望師點破楊岐曰此是比部弘願深廣利濟羣生公曰未審如何楊岐示以偈曰應現宰官身廣弘悲願深為人重指處棒下血淋淋公於此有省宋提刑郭祥正嗣法白雲端郭祥正字功甫當塗人號淨空居士官至殿中丞棄去隱於青山嘗絶江謁舒州白雲端禪師師上堂曰夜來枕上作得個山頌謝功甫大儒廬山二十年之舊今日遠訪白雲之勤當須舉與大衆請已後分明舉似諸方此頌豈唯謝功甫大儒直要與天下有鼻孔衲僧脫却著肉汗衫莫言不道乃曰上大人丘乙己化三千七十士爾小生八九子佳作仁可知禮也公切疑後聞小兒頌之忽有省以書報白雲白雲以偈答曰藏身不用縮頭斂迹何須收腳金烏半夜遼天玉兔趕他不著一日白雲問曰牛淳乎公曰淳矣白雲叱之公拱手而立白雲曰淳乎淳乎南泉大溈無異此也乃贈偈曰牛來山中水足草足牛出山去東觸西觸元祐中往衢之南禪謁泉萬卷請升座公趨前拈香曰海邊枯木入手成香爇向爐中橫穿香積如來鼻孔作此大事須是對衆白過始得雲居老人有箇無縫布衫分付南禪禪師著得不長不短進前則諸佛讓位退步則海水澄波今日嚬呻六種震動遂召曰大衆還委悉麼有意氣時添意氣不風流處也風流泉曰相鈍置公曰因誰致得崇寧初到黃梅東山請演禪師説法公趨前拈香曰此一瓣香爇向爐中供養我堂頭法兄禪師伏願於方廣座上擘開面門放出先師頂相與諸人描邈何以如此白雲巖畔舊相逢往日今朝事不同夜靜水寒魚不食一爐香散白蓮峰祖遂云曩謨薩怛哆鉢囉野恁麼恁麼幾度白雲溪上望黃梅華向雪中開不恁麼不恁麼嫩柳垂金線且要應時來不見龐居士問馬大師曰不與萬法為侶者是甚麼人大師云待汝一口吸盡西江水即向汝道大衆一口吸盡西江水萬丈深潭窮到底掠彴不是趙州橋明月清風安可比後又到保寧亦請升座公拈香曰法鼓既鳴寶香初爇楊岐頂𩕳門請師重著楔保寧卓拄杖一下曰著楔已竟大衆證明又卓一下便下座又到雲居請佛印升座公拈香曰覺地相逢一何蚤鶻臭布衫今脫了要識雲居一句玄珍重後園驢喫草召大衆曰此一瓣香薰天炙地去也佛印曰今日不著便被這漢當面塗糊便打乃曰謝公千里來相訪共話東山竹徑深借與一龍騎出洞若逢天旱便為霖擲拄杖下座公拜起佛印曰收得龍麼公曰已在這裏佛印曰作麼生騎公擺手作舞便行佛印拊掌曰祇有這漢猶較些子江州歸宗可宣禪師與郭功甫善及師領歸宗時功甫任南昌尉俄郡守恚師不為禮捃甚遂作書寄功甫曰某世緣尚有六年奈州主抑逼當棄餘喘託生公家願無見阻功甫閲書驚喜且領之中夜其妻夢間見師入其寢失聲曰此不是和尚來處功甫撼而問之妻詳以告呼燈取書示之相笑不已遂孕及生乃名宣老期年記問如昔至三歲白雲端抵其家始見之曰吾姪來也白雲曰與和尚相別幾年宣倒指曰四年矣白雲曰甚處相別曰白蓮莊上白雲曰以何為驗曰爹爹媽媽明日請和尚齋忽聞推車聲白雲問門外是甚麼聲宣以手作推車勢白雲曰過後如何曰平地兩條溝果六周無疾而逝宋郡王趙令襟嗣法昭覺勤郡王趙令襟字表之號超然居士太祖五世孫任南康政成事簡多與禪衲遊公堂間為摩詰丈室適圓悟禪師奉旨來居甌阜公欣然就其爐錘圓悟不少假公固請圓悟曰此事要得相應直須是死一回始得公默契嘗自疏之其略曰家貧遭劫誰知盡底不存空室無人幾度賊來亦打圓悟見囑令加護紹興庚申冬公與汪內翰藻李參政邴曾侍郎開詣徑山謁大慧大慧聞至令擊鼓入室公欣然袖香趨之大慧曰趙州洗鉢盂話居士作麼生會公曰討甚麼碗拂袖便出大慧起搊住曰古人向這裏悟去你因甚麼却不悟公擬對大慧𢮁之曰討甚麼碗公曰還這老漢始得宋樞密徐俯嗣法昭覺勤徐俯字師川分寧人號東湖居士建炎中纍官僉書樞密院事每侍先龍圖謁法昌靈源二禪師語論終日公聞之藐如也及法昌歸寂在笑談間公異之始篤信此道後丁父憂念無以報罔極命靈源至孝址説法靈源登座問答已乃曰諸仁者祇如龍圖平日讀萬卷書如水傳器涓滴不遺且道尋常著在甚麼處而今捨識之後這著萬卷書底又却向甚麼處去也公聞灑然有得遂曰吾無憾矣靈源下座問曰學士適來見箇甚麼便恁麼道公曰若有所見則鈍置和尚去也靈源曰恁麼則老僧不如公曰和尚是何心行靈源大笑靖康初為尚書外郎與朝士同志者挂鉢於天寧寺之擇木堂力參圓悟圓悟亦喜其見地超邁一日至書記寮指圓悟頂相曰這老漢腳跟猶未點地在圓悟面曰甕裏何曾走却鱉公曰且喜老漢腳跟點地圓悟曰莫謗他好公休去宋尚書莫將嗣法大隨靜莫將字少虗豫章人官至尚書因宦西蜀謁南堂靜禪師咨決心要南堂令向好處提撕適如廁俄聞穢氣急以手掩鼻遂有省即呈以偈曰從來姿韻愛風流幾笑時人向外求萬別千差無覓處得來元在鼻尖頭南堂答曰一法才通法法周縱橫妙用更何求青蛇出匣魔軍伏碧眼胡兒笑點頭語風信頌云摸得黃金特地愁支離縱好漫風流當時若作今時用截斷尚書臭鼻頭宋龍圖王蕭嗣法大隨靜王蕭字觀復官為龍圖留昭覺日聞開靜板聲有省問南堂曰某有箇見處才被人問却開口不得未審過在甚處南堂曰過在有箇見處南堂却問朝斾幾時到任公曰去年八月四日南堂曰自按察幾時離衙公曰前月二十南堂曰為甚麼道開口不得公乃契悟宋參政李邴嗣法徑山杲李邴字漢老濟州任城人拜參知政事公醉心祖道有年聞大慧排默照為邪禪疑怒相半及見大慧示衆舉趙州庭柏垂語曰庭前柏樹子今日重新舉打破趙州關特地尋言語敢問大衆既是打破趙州關為甚麼却特地尋言語良久曰當初祇道茆長短燒了方知地不平公領悟謂天慧曰無老師後語幾蹉過後以書咨決曰邴近扣籌室伏蒙激發蒙滯忽有省入顧惟根識暗鈍平生學解盡落情見一取一捨如衣壞絮行草棘中適自纏繞今一笑頓釋所疑欣幸可量非大宗匠委曲垂慈何以致此自到城中著衣喫飯抱子弄孫色色仍舊既無拘執之情亦不作奇特之想其餘宿習舊障亦稍輕微臨行叮嚀之語不敢忘也重念始得入門而大法未明應機接物觸事未能無礙更望有以提誨使卒有所至庶無玷於法席矣又書曰比蒙誨答備悉深旨邴自驗者三一事無逆順隨緣即應不留胸中二宿習濃厚不加排遣自爾輕微三古人公案舊所茫然時復瞥地此非自味者前書大法未明之語蓋恐得少為足當擴而充之豈別求勝解耶淨勝現流理則不無敢不銘佩宋寶學劉彥修嗣法徑山杲劉彥修字子羽官為寶學出知永嘉問道於大慧禪師大慧曰僧問趙州狗子還有佛性也無趙州道無但恁麼看公後乃於柏樹子上發明有頌曰趙州柏樹太無端境上追尋也大難處處緑楊堪繫馬家家門底透長安宋提刑吳偉明嗣法徑山杲吳偉明字元昭官提刑久參真歇了禪師得自受用三昧為極致後訪大慧於洋嶼庵隨衆入室大慧舉狗子無佛性話問之公擬答大慧以竹篦便打公無對遂留咨參一日大慧謂曰不須呈伎倆直須啐地折嚗地斷方敵得生死若祇呈伎倆有甚了期即辭去道次延平倏然契悟連書數頌寄大慧皆室中所問者有曰不是心不是佛不是物通身一具金鎖骨趙州親見老南泉解道鎮州出蘿蔔大慧即説偈證之曰通身一具金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊宋門司黃彥節嗣法徑山杲門司黃彥節字節夫號妙德於大慧一喝下疑情頓脫大慧以衣付之嘗舉首山竹篦話至葉縣近前奪得拗折擲向階下曰是甚麼首山曰瞎公曰妙德到這裏百色無能但記得曾作臘梅絶句曰擬嚼枝頭蠟馨香却肖蘭前村深雪裏莫作嶺梅看宋參政錢端禮嗣法護國元錢端禮字處和號松任至參政參護國元禪師發明己事後於宗門旨趣一一極之淳熙丙申冬簡堂歸住平田遂與往來丁酉秋示微疾請簡堂機詣榻次公起趺坐言笑移時即書曰浮世虗幻本無去來四大五蘊必歸終盡蓋為地水風火暫時湊泊不可錯認為自己從上諸聖去住自由今吾如是豈不快哉置筆顧簡堂曰坐去好臥去好簡堂曰相公去便了理會甚坐與臥耶公笑曰法兄當為祖道自愛遂斂目而逝宋內翰曾開嗣法靈隱遠曾開字天遊官至禮部侍郎久參圓悟暨往來大慧之門有年矣紹聖辛未佛海遠禪師住三衢公與超然居士趙公訪之問曰如何是善知識佛海曰燈籠露柱貓兒狗子公曰為甚麼贊即歡喜毀即煩惱佛海曰侍郎曾見善知識否公曰某三十年參問何言不見佛海曰向歡喜處見煩惱處見公擬議佛海震聲便喝公擬對佛海曰開口底不是公惘然佛海召曰侍郎向甚麼處去也公猛省遂點頭説偈曰咄這瞎驢叢林妖孽震地一聲天機漏泄有人更問道如何拈起拂子驀口截佛海曰也祇得一橛公又致書大慧曰某自幼年發心參禮知識扣問此事弱冠之後即為婚宦所役用工夫不純因循至今老矣未有所聞常自愧嘆今幸私家塵緣都畢間居無事正在痛自鞭策以償初志第恨未得親炙教誨耳一生敗闕已一一呈似必能洞照此心望委曲提警日用當如何做工夫庶幾不涉他途徑與本地相契也如此説話敗闕不少但方投誠自難隱逃良可愍也至扣大慧答書曰既為士人科舉婚宦聖賢亦不能免但時時於靜勝中切不得忘了須彌山放下著兩則語但從腳下著實做將去已過者不須怖畏亦不必思量思量怖畏即障道矣宋待制潘良貴嗣法佛燈珣待制潘良貴居士字義榮金華人年四十回心祖闈所至挂鉢隨衆參扣後依佛燈久之不契因訴曰良貴祇欲死去時如何佛燈曰好箇封皮且留著使用而今不了不當忽被他換却封皮卒無整理處公又以南泉斬貓兒話問曰某看此甚久終未透徹告和尚慈悲佛燈曰你祇管理會別人家貓兒不知走却自家狗子公於言下如醉醒宋侍郎李浩嗣法天童華侍郎李浩字德遠號正信幼閲首楞嚴經如遊舊國志而不忘持橐後造明果投誠入室應庵堪其𮌎曰侍郎死後向甚麼處去公駭然汗下應庵喝出公退參不旬日竟躋堂奧以偈寄同參嚴康朝曰門有孫臏鋪家存甘贄妻夜眠還蚤起誰悟復誰迷應庵見稱善有鬻胭脂者亦久參應庵頗自負公贈之偈曰不塗紅粉自風流往往禪徒到此休透過古今圈䙡後却來這裏喫拳頭宋吳十三道人嗣法開善謙建寧府仙州山吳十三道人每以己事扣諸禪及開善歸結茅於其左遂往給侍紹興庚申三月八日夜適然啓悟占偈呈開善曰元來無縫罅觸著便光輝既是千金寶何須彈兒開善答曰啐地折時真慶快死生凡聖盡平沉仙州山下呵呵笑不負相期宿昔心
