body:
  text: 徑山語風老人圓信較定無地地主人郭凝之彚編維摩大士維摩會上三十二菩薩各説不二法門文殊曰我於一切法無言無説無示無識離諸問答是為菩薩入不二法門於是文殊又問維摩仁者當説何等是菩薩入不二法門維摩默然文殊讚曰乃至無有語言文字是菩薩真入不二法門雪竇舉此至仁者當説何等是菩薩入不二法門不舉維摩默然便云維摩道甚麼又云勘破了也復頌云咄這維摩老悲生空懊惱臥疾毗耶離全身太枯稿七佛祖師來一室且頻掃請問不二門當時便靠倒不靠倒金毛獅子無處討圜悟勤云如今禪和子便道無語是靠倒且莫錯認定盤星白雲端頌云一箇兩箇百千萬屈指尋文數不辦暫時放在暗窗前明日與君重計算梁雙林善慧大士傅翕善慧大士者婺州義烏縣人也齊明帝建武四年丁丑五月八日降於雙林鄉傅宣慈家本名翕年十六納劉氏女名妙光生普建普成二子梁普通元年年二十四與里人稽亭浦摝魚獲已沉籠水中祝曰去者適止者留人或謂之愚會有天竺僧嵩頭陀引之臨水觀影見圓光寶蓋法從甚盛翕笑而悟乃至松山頂結庵雙檮樹間自號雙林善慧大士種植蔬果為人傭作晝作夜歸與妻敷演佛法苦行七年大士欲導羣品令弟子奉書詣闕稱武帝為國主救世菩薩帝預敕鎖門以觀其意大士袖出木槌一扣諸門盡開直入見帝於善言殿上御榻對語帝問師事從誰答曰從無所從師無所師事無所事大士三至京師以度道俗不可數計帝召見壽光殿共論真諦大士曰息而不滅帝請講金剛經大士才升座以尺揮案一下便下座帝愕然聖師曰陛下還會麼帝曰不會聖師曰大士講經竟又一日講經次帝至衆皆起大士端坐不動衆報聖駕臨此何不起大士曰法地若動一切不安大士一日披衲頂冠靸履朝見帝問是僧耶大士以手指冠是道耶大士以手指履是俗耶大士以手指衲衣陳宣帝大建元年入涅槃壽七十三嘗著心王銘曰觀心空王玄妙難測無形無相有大神力能滅千災成就萬德體性雖空能施法則觀之無形呼之有聲為大法將心戒傳經水中鹽味色裏膠青決定是有不見其形心王亦爾身內居停面門出入應物隨情自在無礙所作皆成了本識心識心見佛是心是佛是佛是心念念佛心佛心念佛欲得早成戒心自律淨律淨心心即是佛除此心王更無別佛欲求成佛莫染一物心性雖空貪嗔體實入此法門端坐成佛到彼岸已得波羅蜜慕道真士自觀自心知佛在內不向外尋即心即佛即佛即心心明識佛曉了識心離心非佛離佛非心非佛莫測無所堪任執空滯寂於此漂沉諸佛菩薩非此安心明心大士悟此玄音身心性妙用無更改是故智者放心自在莫言心王空無體性能使色身作邪作正非有非無隱顯不定心性離空能凡能聖是故相勸好生防慎剎那造作還復漂沉清淨心智如世黃金般若法藏並在身心無為法寶非淺非深諸佛菩薩了此本心有緣遇者非去來今有偈曰夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止纖毫不相離如身影相似欲識佛去處祇這語聲是保寧勇云大衆傅大士此頌古今不墜一切人知向此瞥地者固多錯會者不少玄沙云大小傅大士只認得箇昭昭靈靈洞山聰云且道衲僧家日裏還曾睡也無此兩轉語誰言世上無仙客須信壺中別有天保寧亦有一頌要眠時即眠要起時即起水洗面皮光啜茶濕却嘴大海紅塵處平地波濤起呵呵阿呵呵囉哩囉囉哩又曰空手把鋤頭步行騎水牛人從橋上過橋流水不流斷橋倫頌云狗走抖擻口猴愁樓搜頭瑞巖門外水自古向西流張無盡見皓布裩舉大士此頌皓曰此頌得法身邊事頌不得法身向上事無盡曰請和尚頌皓遂應聲頌曰昨夜雨雱亨打倒葡萄棚知事普請行者人力拄底拄撑底撑撑撑拄拄到天明依舊可憐生又曰有物先天地無形本寂寥能為萬象主不逐四時凋唐龐蘊居士嗣法馬祖一囊州居士龐蘊衡州衡陽縣人也字道玄世本儒業少悟塵勞志求真諦唐貞元初謁石頭遷禪師問不與萬法為侶者是甚麼人石頭以手掩其口豁然有省後與丹霞為友一日石頭問曰子見老僧以來日用事作麼生居士曰若問日用事即無開口處乃呈偈曰日用事無別唯吾自偶諧頭頭非取捨處處沒張乖朱紫誰為號丘山絶點埃神通并妙用運水及搬柴石頭然之曰子以緇邪素邪居士曰願從所慕遂不剃染後參馬祖問不與萬法為侶者是甚麼人馬祖曰待汝一口吸盡西江水即向汝道居士於言下頓領玄旨東林圭老頌云大海波濤淺小人方寸深海枯終見底人死不知心雲門杲頌云一口吸盡西江水甲乙丙丁庚戊己咄咄咄囉囉哩白雲端頌云一口吸盡西江水萬古千今無一滴要須黨理不黨親馬祖可惜口門窄乃留駐參承二載居士一日問馬祖曰如水無筋骨能勝萬斛舟此理如何馬祖曰遮裏無水亦無舟説甚麼筋骨居士又問馬祖曰不昧本來人請師高著眼祖直下居士曰一種沒絃琴惟師彈得妙祖直上居士乃作禮馬祖歸方丈居士隨後入曰弄巧成拙妙喜曰馬師上下即不無爭奈昧却本來人居士雖然禮拜渾崙吞箇棗馬祖歸方丈士隨後入云弄巧成拙救得一半居士有偈曰有男不婚有女不嫁大家團欒頭共説無生話徑山杲示羅快然云昔龐居士有言有男不婚有女不嫁大家團欒頭共説無生話後來元豐間有箇士人謂之無為居士姓楊名傑字次公嘗參前輩於宗門中有真實得力處曾和龐公此偈云男大須婚女大須嫁討甚間工夫更説無生話這兩箇俗漢子將他十方常住一片田地不向官中印契各自分疆列界道我知有而時時向無佛處稱尊當時亦有箇不平底謂之海印信禪師時住蘇州定慧因見無為此偈亦有一偈曰我無男婚我無女嫁困來便打眠誰管無生話這三箇老漢説此三偈快然居士開眼也著合眼也著不開不合也著妙喜只得冷地看看即不無畢竟快然居士向開眼處著到耶合眼處著到耶不開不合處著到耶若向開眼處著到則落在龐公圈䙡裏在合眼處著到則落在楊無為圈䙡裏在不開不合處著到則落在海印禪師圈䙡裏快然見恁麼説定道總不恁麼若總不恁麼又落在妙喜圈䙡裏要出三老圈䙡則易要出妙喜圈䙡則難快然畢竟如何出得待歸延平嫁了女却緩緩地來為你説破自爾機辨迅捷諸方嚮之因至藥山藥山和尚石頭法嗣藥山問曰一乘中還著得這箇事麼居士曰某甲祇管日求升合不知還著得麼藥山曰道居士不見石頭得麼居士曰拈一放一未為好手藥山曰老僧住持事繁居士珍重便出藥山曰拈一放一的是好手居士曰好箇一乘問宗今日失却也藥山曰是是因辭藥山藥山命十禪客相送至門首居士乃指空中雪曰好雪片片不落別處有全禪客曰落在甚處居士遂與一掌全曰也不得草草居士曰恁麼稱禪客閻羅老子未放你在全曰居士作麼生居士又掌曰眼見如盲口説如啞丹霞和尚法嗣石頭一日來訪居士見女子靈照洗菜次霞問居士在否靈照放下菜籃斂手而立霞又問居士在否靈照提籃便行歸舉似居士居士曰赤土搽牛嬭丹霞乃隨後入見居士居士見來不起亦不言霞乃竪起拂子居士竪起槌子霞曰祇恁麼更別有居士曰這回見師不似於前霞曰不妨減人聲價居士曰比來折你一下霞曰恁麼則啞却天然口也居士曰你啞由本分纍我亦啞霞便擲下拂子而去居士召曰然闍梨然闍梨霞不顧居士曰不惟患啞兼更患聾丹霞一日訪居士曰昨日相見何似今日居士曰如法舉昨日事來作箇宗眼霞曰祇如宗眼還著得龐公麼居士曰我在你眼裏霞曰某甲眼窄何處安身居士曰是眼何窄是身何安霞休去居士曰更道取一句便得此話圓霞亦不對居士曰就中這一句無人道得一日居士向丹霞前叉手立少時即出去霞不顧居士却來坐霞却向居士前叉手立少時便入方丈居士曰汝入我出未有事在霞曰這老翁出出入入有甚了期居士曰却無些子慈悲心霞曰引得這漢到這田地居士曰把甚麼引霞乃拈起居士幞頭曰却似一箇老師僧居士却將幞頭安霞頭上曰一似箇少年俗人霞應喏三聲居士曰猶有昔時氣息在霞乃拋下幞頭曰大似一箇烏紗巾居士乃應喏三聲霞曰昔時氣息爭忘得居士彈指三下曰動天動地一日丹霞見居士來便作走勢居士曰猶是拋身勢怎生是嚬呻勢霞便坐居士乃向前以拄杖畫地作七字霞於下面書箇一字居士曰因七見一見一忘七霞曰這裏著語居士乃哭三聲而去一日居士與丹霞出行見江水澄碧居士指水曰得恁麼也還辨不出霞曰的箇辨不出居士以手戽水潑霞三遍霞曰莫恁麼莫恁麼却以水潑居士居士曰當恁麼時堪作箇甚麼霞曰無物外居士曰得便宜人少得便宜人少霞無對居士曰誰不落便宜又一日訪居士至門首相見乃問居士在不居士曰飢不擇食丹霞曰龐老在否居士曰蒼天蒼天便入宅去丹霞曰蒼天蒼天便回居士一日訪長髭和尚法嗣石頭師升座衆集定居士出曰各請自撿好却於禪牀右立時有僧問不觸主人翁請師答話長髭曰識龐公麼曰不識居士便搊住曰苦哉苦哉僧無對居士便拓開師少間却問適來這僧還喫棒否居士曰待伊甘始得長髭曰居士祇見錐頭利不見鑿頭方居士曰恁麼説話某甲即得外人聞之要且不好長髭曰不好箇甚麼居士曰阿師祇見錐頭尖不見鑿頭利應菴華云風行草偃水到渠成覿面提持斬釘截鐵龐居士打開無盡寶藏運出自己家珍要且只解自家富貴安能富貴別人長髭久經陳敵慣戴作家至險至危處愈見八面玲瓏歸宗大衆集定其間設有一個半個善能自撿便與趕出何故家無白澤之圖豈有如是妖怪大同普濟和尚法嗣石頭一日問居士曰是箇言語今古少人避得唇舌只如翁避得麼居士應喏普濟再舉前話居士曰甚麼處去來普濟又舉前話居士曰什麼處去來普濟曰非但如今古人亦有此語句居士作舞而去普濟曰這風顛漢自過教誰點撿一日普濟訪居士居士曰憶在母胎時有一則語舉似阿師不得作道理主持普濟曰猶是隔生也居士曰向道不得作道理普濟曰驚人之句爭得不怕居士曰如師見解可謂驚人普濟曰不作道理却成道理居士曰不但隔一生兩生普濟曰粥飯底僧一任撿責居士鳴指三下普濟一日見居士來便掩却門曰多知老翁莫與相見居士曰獨坐獨語過在阿誰普濟乃開門居士把住曰是師多知是我多知普濟曰多知且置閉門與開門卷舒爭幾許居士曰祇此一問氣急殺人普濟默然居士曰弄巧成拙一日見普濟居士拈起手中笊籬曰大同師大同師普濟不應居士曰石頭一宗到師處氷消瓦解普濟曰不得龐翁舉灼然如此居士拋下笊籬曰寧知不直一文錢普濟曰雖不直一文錢欠他又爭得居士作舞而去普濟提起笊籬曰居士居士回首普濟作舞而去居士撫掌曰歸去來歸去來大梅和尚法嗣馬祖居士聞之欲驗師實特去相訪才相見居士便問久嚮大梅未審梅子熟也未大梅曰熟也你向甚麼處下口居士曰百雜碎大梅伸手曰還我核子來居士便去訪芙蓉太育法嗣馬祖因行食到居士前居士擬接育乃縮手曰生心受施淨名蚤訶去此一機居士還甘否居士曰當時善現豈不作家育曰非關他事居士曰食到口邊被他奪却育乃下食居士曰不消一句子圓悟勤云善現作家芙蓉奇特盡被龐居士一時領過了也只如龐居士道不消一句子且道是那一句端坐受供養施主𫎇安樂頌云淨明呵善現芙蓉勘龐老彼此不相饒峻機無處討雲行雨施雷奔電掃殺虎陷虎出草入草毗婆尸佛早留心直至如今不得妙又問馬大師著實為人處還分付吾師否育曰某甲尚未見他作麼生知他著實處居士曰祇此見知也無討處育曰居士也不得一向言説居士曰一向言説師又失宗若作兩向三向師還開得口否育曰直是開口不得可謂實也居士撫掌而出本溪和尚法嗣馬祖因居士問丹霞打侍者意在何所本溪曰大老翁見人長短在居士曰為我與師同參方敢借問本溪曰若恁麼從頭舉來共你商量居士曰老大翁不可共你説人是非本溪曰念翁年老居士曰罪過罪過一日本溪見居士來乃目示多時居士乃將杖子畫一圓相本豁便近前以腳踏居士曰是甚麼是甚麼却於居士前畫一圓相居士亦以腳踏却本豁曰來時有去時無居士抱杖子而立本溪曰來時有去時無居士曰幸自圓成徒勞目視本溪拍手曰奇時一無所得居士拈杖子點點而去本溪曰看路看路居士曰是甚麼是甚麼石林和尚法嗣馬祖見居士來乃竪起拂子曰不落丹霞機試道一句子居士奪却拂子却自竪起拳石林曰正是丹霞機居士曰與我不落看石林曰丹霞患啞龐公患聾居士曰恰是石林無語居士曰向道偶爾又一日問居士某甲有箇借問居士莫惜言語居士曰便請舉來石林曰元來惜言語居士曰這箇問訊不覺落他便宜石林乃掩耳居士曰作家作家石林一日自下茶與居士居士才接茶石林乃抽身退後曰何似生居士曰有口道不得石林曰須是恁麼始得居士拂袖而去曰也大無端石林曰識得龐翁也居士却回石林曰也大無端居士無語石林曰也解無語去又訪齊峯和尚法嗣馬祖齊峯曰俗人頻頻入僧院討箇甚麼居士回顧兩邊曰誰恁麼道齊峯乃咄之居士曰在這裏齊峯曰莫是當陽道麼居士曰背後底聻齊峯回首曰看看居士曰草賊大敗齊峯無語一日齊峯與居士並行居士乃前行一步曰我強如師一步齊峯曰無背向老翁要爭先在居士曰苦中苦未是此一句齊峯曰怕翁不甘居士曰老翁若不堪齊峰堪作箇甚麼齊峯曰若有棒在手打不解倦居士便行一摑曰不多好齊峯始拈棒被居士把住曰這賊今日一場敗闕齊峯笑曰是我拙是公巧居士乃撫掌出曰平交平交居士又問此去峯頂有幾里齊峯曰甚麼處去來居士曰可謂峻硬不得問著齊峯曰是多少居士曰一二三齊峯曰四五六居士曰何不道七齊峯曰才道七便有八居士曰住得也齊峯曰一任添取居士喝便出去齊峯隨後亦喝居士曰不得堂堂道齊峯曰還我恁麼時龐公主人翁來居士曰少神作麼齊峯曰好箇問訊問不著人居士曰好來好來應菴華云發大機顯大用且非電光石火疾焰過風要須平地上嶮崖孤峻處平坦看他二老深入虎穴透徹淵源至於結角羅紋遊刃磅礴得大自在因甚麼峰頂未曾到只如齊峰云還我恁麼時龐老主人公來士云少神作麼歸宗向這裏擬著箇眼也要諸人瞥地良久云竹影掃階塵不動月穿潭底水無痕又訪百靈和尚法嗣馬祖路次相逢百靈便問南嶽得力句還曾舉向人也無居士曰曾舉來百靈曰舉向甚麼人居士以手自指曰龐公百靈曰直是妙德空生也讚歎不及居士却問阿師得力句是誰得知百靈戴笠子便行居士曰善為道路百靈更不回首徑山杲云這箇話端若不是龐公幾乎錯舉似人雖然如是百靈輸他龐老一著何故當時不得箇破笠頭遮却髑髏有甚面目見他龐公楚石琦云百靈戴笠便去得力句分明舉似來因甚麼妙喜老人道百靈有甚面目見他龐公也是扶強不扶弱有人與妙喜作主要問作麼生是得力句速道速道擬議不來劈脊便棒一日百靈問曰道得道不得俱未免汝且道未免箇甚麼居士以目瞬之百靈曰奇特更無此也居士曰師錯許人百靈曰誰不恁麼誰不恁麼居士珍重而去一日百靈在方丈內坐居士入來百靈把住曰今人道古人道居士作麼生道居士打百靈一摑百靈曰不得不道居士曰道即有過百靈曰還我一摑來居士近前曰試下手看百靈便珍重一日居士問百靈曰是這箇眼目免得人口麼百靈曰作麼免得居士曰情知情知百靈曰棒不打無事人居士轉身曰打打百靈方拈棒起被居士把住曰與我免看百靈無語又訪松山和尚法嗣馬祖同居士喫茶居士舉起橐子曰人人盡有分為甚麼道不得松山曰祇為人人盡有所以道不得居士曰阿兄為甚麼却道得松山曰不可無言也居士曰灼然灼然松山便喫茶居士曰阿兄喫茶為甚麼不揖客松山曰誰居士曰龐公松山曰何須更揖後丹霞聞乃曰若不是松山幾被箇老翁惑亂一上居士聞之乃令人傳語丹霞曰何不會取未舉橐子時一日松山與居士看耕牛居士指牛曰是伊時中更安樂只是未知有松山曰若非龐公又爭識伊居士曰阿師道渠未知有箇甚麼松山曰未見石頭不妨道不得居士曰見後作麼生松山撫掌三下一日居士訪松山見松山携箇杖子便曰手中是箇甚麼松山曰老僧年邁闕伊一步不得居士曰雖然如是壯力猶存松山便打居士曰放却手中杖子致將一問來松山拋下杖子居士曰這老漢前言不付後語松山便喝居士曰蒼天中更有怨苦一日松山與居士行次見僧擇菜松山曰黃葉即去青葉即留居士曰不落黃葉又怎生松山曰道取居士曰不為賓主大難松山曰只為強作主宰居士曰誰不恁麼松山曰不是不是居士曰青黃不留處就中難道松山曰也解恁麼去居士珍重大衆松山曰大衆放你落機處居士便行一日松山與居士話次倐拈起案上尺子曰還見這箇麼居士曰見松山曰見箇甚麼居士曰松山松山松山曰不得不道居士曰爭得松山乃拋下尺子居士曰有頭無尾得人憎松山曰不是公今日還道不及居士曰不及箇甚麼松山曰有頭無尾居士曰強中得弱即有弱中得強即無松山抱住居士曰這箇老子就中無話處又訪則川和尚法嗣馬祖則川曰還記得見石頭時道理否居士曰猶得阿師重舉在則川曰情知久參事慢居士曰阿師老耄不啻龐公則川曰二彼同時又爭幾許居士曰龐公鮮健且勝阿師則川曰不是勝我祇欠汝箇幞頭居士拈卜幞頭曰恰與師相似川大笑而已川摘茶次居士曰法界不容身師還見我否則川曰不是老僧洎答公話居士曰有問有答蓋是尋常則川乃摘茶不聽居士曰莫怪適來容易借問川亦不顧居士喝曰這無禮儀老漢待我一一舉向明眼人則川乃拋却茶籃便歸方丈雪竇云則川只解把定封疆不能同生同死當時好與捋下幞頭誰敢喚作龐居士一日則川在方丈內坐居士見曰只知端坐方丈不覺僧到參時則川垂下一足居士便出三兩步却回則川却收足居士曰可謂自由自在則川曰爭奈主人何居士曰阿師只知有主不知有客則川喚侍者點茶居士乃作舞而出居士到仰山法嗣溈山問久嚮仰山到來為甚麼却覆仰山竪起拂子居士曰恰是仰山曰是仰是覆居士乃打露柱曰雖然無人也要露柱證明仰山擲下拂子曰若到諸方一任舉似白雲端頌云兩箇八文為十六從頭數過猶不足拿來亂撒向階前滿地團團春蘚緑又訪洛浦和尚法嗣夾山居士拜起曰仲夏毒熱孟冬薄寒洛浦曰莫錯居士曰龐翁年老洛浦曰何不寒時道寒熱時道熱居士曰患聾作麼洛浦曰放你二十棒居士曰啞却我口塞却你眼應菴華云龐居士雖是煅了底金要且未經本分鉗鎚洛浦雖輕放過歸宗不免賊過後張弓當時待他道仲夏毒熱孟冬薄寒便與趕出何故車不橫推理無曲斷居士一日訪谷隱道者谷隱問曰誰居士竪起杖子谷隱曰莫是上上機麼居士拋下杖子谷隱無語居士曰只知上上機不覺上上事谷隱曰作麼生是上上事居士拈起杖子谷隱曰不得草草居士曰可憐強作主宰谷隱曰有一機人不要拈捶竪拂亦不用對答言辭居士若逢如何則是居士曰何處逢谷隱把住居士乃曰莫這便是否居士驀面便唾谷隱無語居士與一頌曰焰水無魚下底鈎覔魚無處笑君愁可憐谷隱孜禪伯被唾如今見亦羞居士嘗遊講肆隨喜金剛經至無我無人處致問曰座主既無我無人是誰講誰聽座主無對居士曰某甲雖是俗人粗知信向座主曰祇如居士意作麼生居士以偈答曰無我復無人作麼有踈親勸君休歷座不似直求真金剛般若性外絶一纖塵我聞并信受總是假名陳座主聞偈欣然仰歎居士因在床上臥看經有僧見云居士看經須具威儀居士翹起一足僧無語居士一日在洪州市內賣笊籬見一僧緣化乃將一文錢問曰不辜負信施道理還道得麼若道得即捨僧無語居士曰你問我與你道便問不辜負信施道理作麼生居士曰少人聽又曰會麼僧曰不會居士曰是誰不會居士一日見牧童乃問路從甚麼處去童曰路也不識居士曰這看牛兒童曰這畜生居士曰今日甚麼時也童曰插田時也居士大笑居士所至之處老宿多往復問酬皆隨機應響非格量軌轍之可拘也元和中北遊襄漢隨處而居有女名靈照常鬻竹漉籬以供朝夕居士嘗有偈曰十方同聚會箇箇學無為此是選佛場心空及第歸又曰心如境亦如無實亦無虗有亦不管無亦不拘不是聖賢了事凡夫妙喜拈云白的的清寥寥水不能濡火不能燒是箇甚麼切不得問著問著則瞎却你眼以拄杖擊香臺一下楚石琦拈云要作了事凡夫更須進前三步易復易即此五蘊有真智十方世界一乘同無相法身豈有二若捨煩惱入菩提不知何方有佛地護生須是殺殺盡始安居會得箇中意鐵船水上浮圜悟勤舉此偈云且道殺箇甚麼殺衆生物命凡夫見解殺六賊煩惱座主見解殺佛殺祖大闡提人見解衲僧分上畢竟殺箇甚麼試定當看僧問未審殺箇甚麼師曰大有人疑著曰學人到這裡直得步步絶行蹤時如何悟曰未有金剛王寶劒在圜悟又云只如護生須用殺且道殺箇甚麼便有禪和子道不是殺物命只是殺無明賊殺煩惱賊殺六根六塵賊殺爭人爭我賊雖然一期也似要且未夢見衲僧腳跟頭既是護生須是明殺意如何是殺意嶮若向箇裏辨得出便可放一線道浩浩之中管取坐斷天下人舌頭然後始殺得盡然雖如是釋迦老子也殺不盡迦葉也殺不盡西天二十八祖也殺不盡唐土六祖也殺不盡要明不盡底須是放却從前已後見解明暗玄妙理性殊勝奇特潔淨剗除不留毫末也不到極盡處只如正盡處合作麼生還委悉麼深山大澤無人到聚頭正好共商量中峰本云莫是殺生與護生一念平等麼恁麼商量瞎人眼目居士與行婆靈照坐次居士曰難難難十石油麻樹上攤婆曰易易易百草頭上祖師意靈照曰也不難也不易飢來喫飯困來睡妙喜云此三人同行不同步同得不同失若以心意識摶量卜度非獨不見三人落著處十二時中亦自昧却本地風光不見本來面目未免被難易不難易牽挽不得自在欲得自在將此三人道底作一句看妙喜已是拖泥帶水下注腳了也居士曰祇如道明明百草頭明明祖師意如何會靈照曰老老大大作這箇語話居士曰你作麼生靈照曰明明百草頭明明祖師意居士乃大笑徑山杲云龐居士先行不到靈照女末後太過直饒齊行齊到若到雲門一坑埋却且道過在甚麼處明明百草頭明明祖師意楚石琦云明明百草頭明明祖師意龐公只解拋磚靈照何曾瞥地從教千古萬古黑漫漫填溝塞壑沒人會偶同賣漉籬下橋喫撲靈照見亦倒地居士曰你作甚麼靈照曰見爺倒地某甲相扶居士將入滅謂靈照曰視日早晚及午以報照遽報日已中矣而有蝕也居士出戶觀次靈照即登父座合掌坐亡居士笑曰我女鋒捷矣於是更延七日州牧于公頔問次居士謂之曰但願空諸所有慎勿實諸所無好住世間皆如影響言訖枕于公膝而化遺命焚棄江湖緇白傷悼謂禪門龐居士即毗耶淨名有詩偈三百餘篇傳於世鑒咦氏云余覽居士臨終偈有空華落影陽焰翻波等語大都居士一門皆再來人也特以慈悲示現為在家標榜故嘗抵襄過罐子灘問狀聞居士有感驢自言債商債事便謂布施本欲集福翻以貽禍因棄家財云則已入不住法門矣乃居士遷化去長子適往田間婆急以告其子應聲未了忽倚钁頭而逝豈惟女捷于機哉及婆收諸靈骨已直向鹿門絶壁震威一喝谺然中開遂投壁與身俱隱畢竟是所有空為復是所無空若也緇素得出許伊把手龐公其或不爾且莫𥧌語
