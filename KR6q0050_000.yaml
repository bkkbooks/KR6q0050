body:
  text: 先覺宗乘先覺宗乘目録卷一維摩大士雙林善慧大士傅翕龐蘊居士嗣法馬祖一卷二甘贄行者嗣法南泉願刺史陸亘嗣法南泉願相國裴休嗣法黃檗運常侍王敬初嗣法溈山祐尚書陳操嗣法陳睦州駙馬李遵勗嗣法谷隱聰文公楊億嗣法廣慧璉侍郎楊傑嗣法天衣懷簽判劉經臣嗣法智海逸清獻公趙忭嗣法蔣山泉丞相張商英嗣法兜率悅侍郎李彌遜嗣法昭覺勤給事馮楫嗣法龍門遠侍郎張九成嗣法徑山杲知府葛郯嗣法佛海遠放牛居士嗣法無門開卷三侍郎白居易嗣法佛光滿刺史李翱嗣法藥山儼張拙秀才嗣法石霜諸相國陸希聲謁仰山寂太傅王延彬嗣法長慶稜真人呂巖嗣法黃龍機丞相王隨嗣法首山念英公夏竦嗣法谷隱聰節使李端願嗣法金山頴太傅高世則嗣法芙蓉楷太守許式嗣法洞山聰修撰曾會嗣法雪竇顯丞相富弼嗣法投子顒衛州王大夫嗣法元豐滿太史黃廷堅嗣法黃龍心觀文王韶嗣法黃龍心祕書吳恂嗣法黃龍心內翰蘇軾嗣法東林總參政蘇轍嗣法上藍順寺丞戴道純嗣法黃龍清文定胡安國嗣法上封秀左丞范沖嗣法圓通旻諫議彭汝霖嗣法圓通旻左司都貺嗣法圓通旻比部孫居士嗣法楊岐會提刑郭祥正嗣法白雲端郡王趙令襟嗣法昭覺勤樞密徐俯嗣法昭覺勤尚書莫將嗣法大隨靜龍圖王蕭嗣法大隨靜參政李邴嗣法徑山杲寶學劉彥修嗣法徑山杲提刑吳偉明嗣法徑山杲門司黃彥節嗣法徑山杲參政錢端禮嗣法護國元內翰曾開嗣法靈隱遠侍制潘良貴嗣法佛燈珣侍郎李浩嗣法天童華吳十三道人嗣法開善謙卷四問法太守楊衒之問達磨使者宋雲問達磨向居士問二祖崔趙公問國一欽中使楊光庭問本淨禪師相國杜鴻漸問無住禪師鄴侯李泌問懶殘張濆行者問忠國師魚軍容問忠國師刺史李渤問歸宗常相國崔羣問東寺會相國于頔問紫玉通藥山儼文公韓愈問大顛通燕王訪趙州諗趙王王鎔問趙州諗馬大夫問趙州諗周員外問趙州諗劉相公問趙州諗竺尚書問長沙岑李軍容參溈山祐劉侍御問仰山寂朱行軍請際上座尚書溫造問圭峰密史山人問圭峰密相國宋齊丘訪慧覺禪師閩王王審知禮雪峰存玄沙備王延鈞延羅山和尚夢筆和尚陳尚書問雲門韋監軍謁玄沙備陳尚書問洞山節度使成汭問雲居膺劉禹端問雲居膺張霸遷問疏山仁劉翁謁青林虔鍾司徒問安鐵胡給事陶穀禮常覺禪師李相公問福巖承李王禮清涼益宋令公對大寧寺僧相國馮延巳問遊鍾山僧樞密李崇矩問圓明禪師歐陽文忠公修延浮山遠丞相呂許公謁志言大士王質問法華言助教徐嶽問法華言相國王安石禮吳山端武昌劉居士對雲居舜李端願禮宗本禪師葉清臣蔣侍郎禮政黃牛陳瓘問宗道者太尉陳良弼禮淨因李朝請謁道場琳相國錢象祖參此菴元卷五無名宰官居士洪州廉使俗士問天堂地獄歸宗因官人來問儒者問三教行者問即心即佛丹霞逢老人與童子丹霞會留守百丈政路逢官人趙州與官人遊園官人問趙州官人問趙州燒木佛俗官問趙州秀才乞拄杖秀才問趙州俗士獻袈裟趙州勘行者秀才問長沙岑普化見步使天使問睦州秀才訪睦州睦州問秀才閩帥問壽山年多少有俗士舉手俗士問殺牛仰山問推官行者問霍山洞山行腳遇官人官人問洞山投子赴檀越齋有官人問壽州閩王問雪峰存閩王封柑橘至雪峰廣主請雲門開堂常侍問雲門官人問雲門閩王送玄沙上船泉守請玄沙登樓閩帥請辨驗聲明三藏閩帥問鼓山晏行者至菴童子見鏡清俗士問靜上座俗士獻畫障子老人參桐峰儒者謁南院牧主請風穴升座提刑問璉三生工部問三交嵩提刑問楊岐會俗士投五祖出家居士往五祖齋僧俗士問雲峰悅太守問九頂侍郎問九仙益州辭知府巡檢問黃龍明俗士問歸仁官人問興陽居士官人問天平居士問東山雲頂童子上經洪塘橋官人問僧賣鹽翁騎牛公子跨驢人道流背佛而坐行者向佛而唾魚浮水上佛殿鴿子廣南國主出獵官人入鎮州天王院官人作無鬼論官人問無揀僧先覺宗乘目録終
