body:
  text: 徑山語風老人圓信較定無地地主人郭凝之彚編洪州廉使洪州廉使逸其名問馬祖曰喫酒肉即是不喫即是馬祖曰若喫是中丞祿不喫是中丞福廉使有省俗士問天堂地獄有一俗士問西堂智藏禪師有天堂地獄否師曰有曰有佛法僧寶否師曰有更有多問盡答言有曰和尚恁麼道莫錯否師曰汝曾見尊宿來耶曰某甲曾參徑山和尚來師曰徑山向汝作麼生道曰他道一切總無師曰汝有妻否曰有師曰徑山和尚有妻否曰無師曰徑山和尚道無即得歸宗因官人來問廬山歸宗智常禪師因官人來乃拈起帽子兩帶曰還會麼曰不會歸宗曰莫怪老僧頭風不卸帽子儒者問三教有儒者忘其名問大珠海禪師儒釋道三教同異如何師曰大量者用之則同小機者執之即異總從一性起用機見差別成三迷悟由人不在教之同異也行者問即心即佛有行者問大珠曰即心即佛那個是佛大珠曰汝疑那個不是佛指出看行者無對大珠曰達即徧境是不悟永乖疎丹霞逢老人與童子丹霞因去馬祖處路逢一老人與一童子丹霞問公住何處老人曰上是天下是地丹霞曰忽遇天崩地陷又作麼生老人曰蒼天蒼天童子噓一聲丹霞曰非父不生其子老人便與童子入山去丹霞會留守丹霞於天津橋橫臥會留守鄭公出呵之不起吏問其故丹霞徐曰無事僧留守異之百丈政路逢官人洪州百丈山惟政禪師因入京路逢官人喫飯忽見驢鳴官人召曰頭陀師舉頭官人却指驢師却指官人法眼別云但作驢鳴天奇拈云混俗和光何妨異類橫身絲毫不掛那容竪拂敲床大丈夫漢莫覰東魯西晉休談北狄南蠻方見得出岫靈雲然後却來嘲三囉四又且何如趙州與官人遊園趙州與官人遊園次兔見乃驚走遂問和尚是大善知識兔見為甚麼走趙州曰老僧好殺官人問趙州官人問趙州和尚還入地獄否趙州曰老僧末上入曰大善知識為甚麼入地獄趙州曰老僧若不入阿誰教化汝官人問趙州燒木佛官人問趙州曰丹霞燒木佛院主為甚麼眉𩯭墮落趙州曰官人宅內變生作熟是甚麼人官人曰所使趙州曰却是他好手俗官問趙州有俗官問趙州佛在日一切眾生歸依佛佛滅度後一切眾生歸依什麼處趙州曰未有眾生曰現問次趙州曰更覓什麼佛秀才乞拄杖有秀才見趙州手中拄杖乃曰佛不奪眾生願是否趙州曰是秀才曰某甲就和尚乞取手中拄杖得否趙州曰君子不奪人所好秀才曰某甲不是君子趙州曰老僧亦不是佛秀才問趙州有秀才辭趙州曰某甲在此括撓和尚多時無可報答待他日作一頭驢來報答和尚趙州曰教老僧爭得鞍又秀才見趙州乃讚歎曰和尚是古佛趙州曰秀才是新如來俗士獻袈裟有俗士獻袈裟問曰披與麼衣服莫辜負古人也無趙州拋下拂子曰是古是今趙州勘行者趙州聞行者勘僧曰我有十貫錢若有人下得一轉語即捨此錢有人下語並不契趙州遂往行者家行者曰若下得一轉語即捨此錢趙州戴笠子便行瑯琊覺云武帝求仙不得仙王喬端坐却昇天秀才問長沙岑有秀才看千佛名經問長沙岑禪師曰百千諸佛但見其名未審居何國土還化物也無長沙曰黃鶴樓崔顥題後秀才還曾題也未曰未曾長沙曰得閑題取一篇好黃龍新頌云黃鶴樓前法戰時百千諸佛竪降旗問渠國土歸何處贏得多才一首詩圓悟勤拈云驀刀劈面解辨者何人劈箭當胷承當者有幾若能向奔流度刀疾燄過風處見長沙橫身為物去不消一揑其或隨言詮入露布便謂問東答西裂轉話頭且作麼生是長沙端的處還委悉麼殺人刀活人劒語風信拈云可惜一座黃鶴樓被長沙和尚埋沒殺千佛名經裏許喚作註解得麼癡人面前勿得說夢頌云塞雁一聲睺舌冷棲棲蘆苗月明中荒塘踪跡無漁火徒有秋烟拂暗風普化見步使鎮州普化和尚見馬步使出喝道普化亦喝道作相撲勢步使令人打五棒普化曰似即似是即不是天使問睦州有天使問睦州三門俱開從那門入睦州喚尚書天使應諾睦州曰從信門入天使又見畵壁問曰二尊者對譚何事睦州摑露柱曰三身中那箇不說法秀才訪睦州一秀才訪睦州稱會二十四家書睦州以拄杖空中點一點曰會麼秀才罔措睦州曰又道會二十四家書永字八法也不識睦州問秀才睦州問秀才治甚經曰治易睦州曰易中道百姓日用而不知且道不知箇甚麼曰不知其道睦州曰作麼生是道秀才無對睦州曰果然不知妙喜云秀才雖然無語默契睦州只是少末後一着徑山當時若見睦州道果然不知但撫掌呵呵大笑管取睦州不相虧閩帥問壽山年多少閩帥問壽山年多少師曰與虗空齊年曰虗空年多少師曰與壽山齊年有俗士舉手益州西睦和尚上堂有俗士舉手曰和尚便是一頭驢師曰老僧被汝騎士無語去後三日再來白言某甲三日前著賊師拈杖趂出俗士問殺牛有俗士問慧覺某甲平生殺牛還有罪否慧覺曰無罪曰為甚麼無罪慧覺曰殺一個還一個仰山問推官有官人訪仰山仰山問官居何位曰推官仰山竪起拂子曰還推得這箇麼官人無對仰山令眾下語皆不契時三聖不安在涅槃堂內將息仰山令侍者去請下語三聖曰但道和尚今日有事仰山又令侍者問未審有甚麼事三聖曰再犯不容行者問霍山有行者問霍山景通禪師曰如何是佛法大意霍山乃禮拜行者曰和尚為甚麼禮俗人霍山曰汝不見道尊重弟子洞山行脚遇官人洞山行脚次有官人問曰我要註三祖信心銘得否洞山曰只如纔有是非紛然失心作麼生註楚石琦代云裝香着官人問洞山官人問洞山有人修行否洞山曰待公作男子即修行投子赴檀越齋舒州投子山大同禪師在京赴一檀越齋檀越將一盤草來師拳兩手安頭上檀越便將齋來後有僧問和尚在京投齋意旨何如師曰觀世音菩薩有官人問壽州壽州紹宗禪師有官人謂師曰見說江西不立宗師曰遇緣即立曰遇緣立箇甚麼師曰江西不立宗閩王問雪峰存閩王問雪峰義存禪師曰擬欲葢一所佛殿去時如何雪峰曰何不葢取一所空王殿曰請師樣子雪峰展兩手雲門云一舉四十九閩王封柑橘至雪峰雪峰因閩王封柑橘各一顆遣使送至柬問既是一般顏色為甚麼名字不同雪峰遂依舊封回王復馳問玄沙玄沙將一張紙葢却廣主請雲門開堂廣主請雲門出世靈樹開堂日廣主親臨曰弟子請益雲門曰目前無異路法眼別云不可無益于人常侍問雲門雲門在文德殿赴齋有常侍問靈樹菓子熟也未雲門曰甚麼年中得信道生官人問雲門雲門行脚時有官人問還有定乾坤底句麼雲門曰蘇嚕蘇嚕悉哩薩訶閩王送玄沙上船閩王送玄沙備禪師上船師扣船召曰大王爭能出得這裏去王曰在裏許得多少時也歸宗柔別云不因和尚不得到這裡泉守請玄沙登樓泉守王公請玄沙登樓先語客司曰待我引大師到樓前便舁却梯客司稟旨公曰請大師登樓玄沙視樓復視其人乃曰佛法不是此道理法眼云未舁梯時日幾度登樓玄沙與泉守在室中說話有一沙彌揭簾入見却退步而出玄沙曰那沙彌好與二十拄杖守曰恁麼即某甲罪過同安顯別云祖師來也玄沙曰佛法不是恁麼鏡清云不為打水有僧問不為打水意作麼生鏡清云青山碾為塵敢保沒閑人閩帥請辨驗聲明三藏西天有聲明三藏至閩帥請玄沙辨驗玄沙以鐵火筯敲銅爐問是甚麼聲三藏曰銅鐵聲法眼別云請大師為大王法燈別云聽和尚問玄沙曰大王莫受外國人謾三藏無對法眼代云大師久受大王供養法燈代云却是和尚謾大王閩帥問鼓山晏閩帥入萬歲寺瞻仰佛像指問鼓山曰是甚麼佛鼓山曰請大王鑒帥曰鑒即不是佛鼓山曰是甚麼帥無對長慶代云久承大師在眾何得造次行者至菴鏡清怤禪師住菴時有行者至徐徐近牀取拂子提起問某甲喚這箇作拂子庵主喚作甚麼鏡清曰不可更安名立字也行者乃擲却拂子曰著甚死急童子見鏡清有僧引一童子到鏡清曰此童子常愛問人佛法請和尚驗看鏡清乃令點茶童子點茶來師啜了過盞槖與童子童子近前接鏡清却縮手曰還道得麼童子曰問將來法眼別云和尚更喫茶否僧曰此童子見解如何鏡清曰也祇一兩生持戒僧俗士問靜上座有俗士失其名問靜上座曰弟子每當夜坐心念紛飛未明攝伏之方願垂示誨上座曰如或夜間安坐心念紛飛却將紛飛之心以究紛飛之處究之無處則紛飛之念何存反究究心則能究之心安在又能照之智本空所照之境亦寂寂而非寂者葢無能寂之人也照而非照者葢無所照之境也境智俱寂心慮安然外不尋枝內不住定二途俱泯一性怡然此乃還源之要道也俗士獻𦘕障子俗士獻𦘕障子法眼看了問曰汝是心巧手巧士曰心巧法眼曰那個是汝心士無對歸宗柔代云某甲今日却成容易老人參桐峰有老人入山參桐峰菴主桐峰問曰住在甚處老人不語桐峰曰善能對機老人地上拈一枝草示之桐峰便喝老人禮拜桐峰便歸菴老人曰與麼疑殺一切人在儒者謁南院有儒者博覽古今時呼為張百會來謁南院南院問莫是張百會麼曰不敢南院以手於空畫一畫曰會麼曰不會南院曰一尚不會甚麼處得百會來牧主請風穴陞座風穴沼禪師於牧主衙內度夏請陞座時有盧陂長老出問學人有鐵牛之機請師不搭印風穴曰慣釣鯨鯢澄巨浸却嗟蛙步𩥇泥沙陂佇思風穴喝曰長老何不進語陂擬議風穴便打一拂子曰還記得話頭麼試舉看陂擬開口風穴又打一拂子牧主曰信知佛法與王法一般風穴曰見甚麼道理牧主曰當斷不斷反招其亂風穴便下座提刑問璉三生有提刑問璉三生曰某甲四十年為官作麼脫得此塵去璉無對道吾真代曰一任𨁝跳又看上峰路璉曰這箇是上峰路提刑曰寺在上頭那璉曰是提刑曰恁麼則不去也璉無語道吾代曰今日勘破工部問三交嵩有工部問三交智嵩禪師曰百尺竿頭獨打毬萬丈懸崖絲繫腰時如何三交曰幽州著脚廣南廝撲工部無語三交曰勘破這胡漢工部曰二十年江南界裏這回却見禪師三交曰瞎老婆吹火提刑問楊岐會有提刑問楊岐會曰和尚法嗣何人曰慈明提刑曰見箇什麼道理便嗣他楊岐曰共鉢盂喫飯提刑曰與麼則不見也楊岐捺膝曰什麼處是不見提刑大笑楊岐曰須是提刑始得又請入院燒香提刑曰却待回來楊岐乃獻茶信提刑曰這箇却不消得有甚乾嚗嚗底禪希見示些子楊岐指茶信曰這箇尚不要豈況乾嚗嚗底禪提刑擬議楊岐乃有頌示作王臣佛祖罔措為指迷源殺人無數提刑曰和尚為什麼就身打劫楊岐曰元來却是我家裡人提刑大笑俗士投五祖出家有俗士投五祖演出家自曰捨緣五祖曰何謂捨緣士曰有妻子捨之謂之捨緣五祖曰我也有個老婆還信否士默然五祖乃頌曰我有個老婆出世無人見晝夜共一處自然有方便居士往五祖齋僧舒州有一居士常往五祖齋僧一日問首座曰某俗人參得禪麼首座云你是俗人如何參得禪居士不會舉似五祖五祖云首座却有本分手段為人居士方信遂篤志參究後見佛眼佛眼展手曰因甚麼喚作手居士忽大悟俗士問雲峰悅有俗士問雲峰文悅禪師曰如何是佛雲峰曰著衣喫飯量家道曰恁麼則退身三步叉手當𮌎去也雲峰曰醉後添杯不若無太守問九頂太守呂公瞻大像問九頂清素禪師曰既是大像為甚麼肩負兩楹九頂曰船上無散工至閣下覩觀音像又問彌勒化境觀音何來九頂曰家富小兒嬌太守乃禮敬侍郎問九僊侍郎曾公問九僊法清禪師曰上座山鄉甚處曰嚴州曰與此間是同是別九仙拽伽梨下地揖曰官人曾到嚴州否曾罔措九仙曰待官人到嚴州時却向官人道益州辭知府益州澄遠禪師將示寂辭知府曰老僧行脚去通判曰這僧風狂八十歲行脚那裏去知府曰大善知識去住自由巡檢問黃龍明黃龍同胡巡檢到公安二聖巡檢問曰達磨對梁武帝云廓然無聖公安為甚麼却有二聖黃龍曰一點水墨兩處成龍俗士問歸仁有俗士問歸仁禪師俗人還許會佛法否歸仁曰那箇臺無月誰家樹不春有官人問興陽有官人問興陽清剖禪師曰和尚甚麼時開堂師曰不歷僧祇數日月未生前居士官人問天平有居士問天平契愚禪師曰法無動搖時如何天平曰你從潞府來居士曰一步也不曾驀天平曰因甚得到這裏居士曰和尚睡語作麼天平曰放你二十棒又官人問無鄰可隔為甚麼不相見天平曰怨阿誰居士問東山雲頂福州東山雲頂禪師有居士問曰洞山道有一物上拄天下拄地未審是甚麼物師曰擔鐵枷喫鐵棒曰天地黑山河走師曰閻老殿前添一鬼北邙山下臥千年士呌快活快活師曰也是野狐吞老鼠童子上經有童子上經次僧令持經著函內童子曰某甲念底著向那裏法眼代云汝念甚麼經洪塘橋官人問僧福州洪塘橋上有僧列坐官人問此中還有佛麼僧無對法眼代云汝是甚麼人賣鹽翁昔有一僧去覆船路逢一賣鹽翁僧問覆船路向甚麼處去翁良久僧再問翁曰你患聾那僧曰你向我道甚麼翁曰向你道覆船路僧曰翁莫會禪麼翁曰莫道會禪佛法也會盡僧曰你試說看翁挑起鹽籃僧曰難翁曰你喚這個作甚麼僧曰鹽翁曰有甚麼交涉僧曰你喚作甚麼曰不可更向你道是鹽騎牛公子公期和尚因往羅漢路逢一騎牛公子師問羅漢路向甚麼處去公拍牛曰道道師喝曰這畜生公曰羅漢路向甚麼處去師却拍牛曰道道公曰直饒恁麼猶少蹄角在師便打公拍牛便走跨驢人昔有跨驢人問眾僧何往僧曰道場去其人曰何處不是道場僧毆之曰這漢沒道理向道場裡跨驢不下道流背佛而坐昔有道流在佛殿前背佛而坐僧曰道士莫背佛道流曰大德本教中道佛身充滿於法界向甚麼處坐得僧無對法眼代云識得汝行者向佛而唾有一行者隨法師入佛殿行者向佛而唾法師曰行者少去就何以唾佛行者曰將無佛處來與某甲唾法師無對溈山云仁者却不仁者不仁者却仁者仰山代法師云但唾行者又云行者若有語即向伊道還我無行者處來魚浮水上死魚浮於水上有人問僧魚豈不是以水為命僧曰是曰為甚麼却向水中死僧無對杭州天龍機和尚代云是伊為甚麼不去岸上死佛殿鴿子子趂鴿子飛向佛殿欄干上顫有人問僧一切眾生在佛影中常安常樂鴿子見佛為甚麼却顫僧無對法燈代云怕佛廣南國主出獵廣南有僧住庵國主出獵左右報庵主大王來請起庵主曰非但大王來佛來亦不起王問佛豈不是汝師庵主曰是王曰見師為甚麼不起法眼代云未足酬恩官人入鎮州天王院昔有官人入鎮州天王院覩神像因問院主曰此是甚麼功德曰護國天王曰祇護此國徧護餘國曰在秦為秦在楚為楚曰臘月二十九日打破鎮州城天王向甚處去院主無對密雲悟云官人切莫造反復云今日得官人作證官人作無鬼論昔有官人作無鬼論中夜揮毫次忽見一鬼出云汝道無我聻五祖演云老僧當時若見便以手作鵓鳩嘴向伊道谷谷孤官人問無揀僧官人問僧名甚麼曰無揀官人曰忽然將一椀沙與上座又作麼生曰謝官人供養法眼別云此猶是揀底
